<script type="text/babel">
const{useState,useMemo,useCallback,useRef,useEffect}=React;

/* ═══ STORAGE ENGINE ═══ */
const S={
  _cache:{},
  get(k,d){
    if(this._cache[k]!==undefined)return this._cache[k];
    try{const v=localStorage.getItem('rh_'+k);const r=v?JSON.parse(v):d;this._cache[k]=r;return r}catch{return d}
  },
  set(k,v){this._cache[k]=v;try{localStorage.setItem('rh_'+k,JSON.stringify(v))}catch(e){console.warn('Storage full',e)}},
  exportAll(){
    const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('rh_'))d[k.slice(3)]=JSON.parse(localStorage.getItem(k))}
    d._exportDate=new Date().toISOString();d._version='v3';return d;
  },
  importAll(d){
    Object.entries(d).forEach(([k,v])=>{if(k.startsWith('_'))return;localStorage.setItem('rh_'+k,JSON.stringify(v));this._cache[k]=v});
  },
  clear(){const ks=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('rh_'))ks.push(k)}ks.forEach(k=>localStorage.removeItem(k));this._cache={}}
};

/* ═══ CLOUD SYNC (Firebase) ═══ */
const Cloud={
  db:null,roomKey:null,active:false,listeners:[],
  init(config,roomKey){
    try{
      if(!firebase.apps.length)firebase.initializeApp(config);
      this.db=firebase.database();this.roomKey=roomKey;this.active=true;
      console.log('[Cloud] Connected:',roomKey);return true;
    }catch(e){console.error('[Cloud] Init failed:',e);this.active=false;return false}
  },
  push(){
    if(!this.active||!this.db)return Promise.resolve(false);
    const d=S.exportAll();d._pushTime=new Date().toISOString();
    return this.db.ref('rooms/'+this.roomKey).set(d).then(()=>true).catch(e=>{console.error('[Cloud] Push failed:',e);return false});
  },
  pull(){
    if(!this.active||!this.db)return Promise.resolve(null);
    return this.db.ref('rooms/'+this.roomKey).once('value').then(snap=>{
      const d=snap.val();if(d){S.importAll(d);return d}return null;
    }).catch(e=>{console.error('[Cloud] Pull failed:',e);return null});
  },
  disconnect(){this.active=false;this.db=null;this.roomKey=null}
};

/* ═══ CLIPBOARD SYNC ═══ */
const ClipSync={
  encode(){
    const d=S.exportAll();const j=JSON.stringify(d);
    return btoa(unescape(encodeURIComponent(j)));
  },
  decode(b64){
    try{const j=decodeURIComponent(escape(atob(b64.trim())));return JSON.parse(j)}
    catch(e){return null}
  },
  async copyToClip(){
    const code=this.encode();
    try{await navigator.clipboard.writeText(code);return true}
    catch{
      const ta=document.createElement('textarea');ta.value=code;ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);return true;
    }
  },
  restore(b64){
    const d=this.decode(b64);if(!d)return false;
    S.importAll(d);return true;
  }
};

/* ═══ HOOK: persistent state ═══ */
function useP(key,def){
  const[val,setVal]=useState(()=>S.get(key,def));
  const update=useCallback(v=>{
    setVal(prev=>{const nv=typeof v==='function'?v(prev):v;S.set(key,nv);return nv});
  },[key]);
  return[val,update];
}

/* ═══ UTILS ═══ */
const getDK=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
// 한국 시간대 기준
const getToday=()=>{const s=new Date().toLocaleString('en-US',{timeZone:'Asia/Seoul'});return new Date(s)};
const getKoreanTime=()=>new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul',hour:'2-digit',minute:'2-digit',hour12:false});
const getKoreanDate=()=>new Date().toLocaleDateString('ko-KR',{timeZone:'Asia/Seoul',year:'numeric',month:'long',day:'numeric',weekday:'long'});
const getMonday=d=>{const dt=new Date(d);dt.setDate(dt.getDate()-(dt.getDay()||7)+1);return dt};
const getWeekDates=bd=>{const m=getMonday(bd);return Array.from({length:5},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d})};
const DN=['일','월','화','수','목','금','토'];

  const ci=s%3,pi=s%(pers.length||1);const pp=pers[pi]||DEFAULT_PERSONAS[0];
  const pn=(pp.name.split(':')[1]||pp.name).trim();

  const t=[
    {id:dk+'-b1',type:'blog',p:'P0',title:`블로그 #1: ${k1}`,who:'hyerim',min:40,
      guide:[{step:'Claude에 프롬프트 입력',detail:`/blog-legal ${k1}`},{step:'초안 검수 (3분)',detail:'법률 정보 정확성 확인'},{step:'수정 (15~20분)',detail:'① 제목 클릭유도형 변경\n② 서론 공감문장 추가\n③ 핵심정보 굵게\n④ 상담유도 CTA'},{step:'SEO 점검',detail:'/content-check → 70점 이상이면 발행'},{step:'네이버 블로그 발행',detail:'글쓰기 → 붙여넣기 → 태그5개 → 발행'}],
      prompt:`/blog-legal ${k1}`,done:false},
    {id:dk+'-b2',type:'blog',p:'P0',title:`블로그 #2: ${k2}`,who:'hyerim',min:40,
      guide:[{step:'Claude에 프롬프트 입력',detail:`/blog-legal ${k2}`},{step:'검수 (3분)',detail:'#1과 내용 겹침 확인'},{step:'수정 (15~20분)',detail:'제목+사례/숫자 추가+소제목'},{step:'발행',detail:'/content-check → 블로그 발행'}],
      prompt:`/blog-legal ${k2}`,done:false},
    {id:dk+'-c1',type:'cafe',p:'P0',title:`카페 침투: ${['상담후기','해결후기','정보공유'][ci]} (${pn})`,who:'hyerim',min:25,
      guide:[{step:`계정: ${pp.name}`,detail:`${pp.age} ${pp.job}\n말투: ${pp.tone}\n배경: ${pp.background}`},{step:'침투마케팅 탭 → 프롬프트 복사',detail:'페르소나 자동 반영된 프롬프트를 Claude에 입력'},{step:'검수 (5분)',detail:'말투 일치? / 너무 깔끔하지 않은가? / 법무법인명 1번만? / 전화번호 없는가?'},{step:'카페 등록',detail:'⚠️ 계정별 IP 다르게\n⚠️ 같은 카페 다른 계정은 2~3일 간격'},{step:'대시보드에 저장',detail:'본문 복사 + URL + 카페명 입력'}],
      prompt:CAFE_PROMPTS[ci].getPrompt(pp),done:false},
    {id:dk+'-b3',type:'blog',p:'P1',title:`블로그 #3 (여유시): ${k3}`,who:'hyerim',min:40,
      guide:[{step:'여유 확인',detail:'P0 완료 후 진행'},{step:'Claude 프롬프트',detail:`/blog-legal ${k3}`},{step:'빠른 수정+발행',detail:'핵심만 수정 → /content-check → 발행'}],
      prompt:`/blog-legal ${k3}`,done:false},
    {id:dk+'-seo',type:'seo',p:'P1',title:'전일 성과 체크',who:'hyerim',min:15,
      guide:[{step:'블로그 관리자 → 통계',detail:'조회수/유입키워드/순위 확인'},{step:'성과기록 탭에 기록',detail:'수치 입력'},{step:'저조한 글 개선 검토',detail:'제목변경/태그추가/본문보강'}],
      prompt:'',done:false},
    {id:dk+'-nc',type:'cafe',p:'P1',title:'[신입] 카페 후기글 보조',who:'newbie',min:30,
      guide:[{step:'혜림이 준 프롬프트로 초안 생성',detail:'침투마케팅 탭 참고'},{step:'검수 받기',detail:'혜림한테 보여주고 피드백'},{step:'카페 등록',detail:'지정 카페에 올리기'}],
      prompt:'',done:false},

function App(){

  const[tab,setTab]=useState('today');
  const[tasks,setTasks]=useP('tasks',{});
  const[memos,setMemos]=useP('memos',[]);
  const[records,setRecords]=useP('records',[]);
  const[posts,setPosts]=useP('posts',[]);
  const[keywords,setKeywords]=useP('keywords',DEFAULT_KW);
  const[personas,setPersonas]=useP('personas',DEFAULT_PERSONAS);
  const[curUser,setCurUser]=useP('curUser','hyerim');
  const[showMenu,setShowMenu]=useState(false);
  const[copyId,setCopyId]=useState('');
  const[saved,setSaved]=useState(false);
  const[syncMsg,setSyncMsg]=useState('');
  const[cloudCfg,setCloudCfg]=useP('cloudCfg',null);
  const[cloudRoom,setCloudRoom]=useP('cloudRoom','');
  const fileRef=useRef(null);

  // Firebase auto-connect on load
  useEffect(()=>{
    if(cloudCfg&&cloudRoom){
      const ok=Cloud.init(cloudCfg,cloudRoom);
      if(ok){Cloud.pull().then(d=>{if(d)location.reload()})}
    }
  },[]);

  // Cloud push debounce
  const pushTimer=useRef(null);
  const cloudPush=useCallback(()=>{
    if(!Cloud.active)return;
    clearTimeout(pushTimer.current);
    pushTimer.current=setTimeout(()=>{Cloud.push()},3000);
  },[]);

  // Auto-backup every 60s
  useEffect(()=>{
    const iv=setInterval(()=>{
      S.set('_autobackup',S.exportAll());
      S.set('_lastBackup',new Date().toISOString());
    },60000);
    return()=>clearInterval(iv);
  },[]);

  const baseDate=useMemo(()=>{const d=new Date(now);d.setDate(d.getDate()+weekOff*7);return d},[weekOff]);
  const wd=useMemo(()=>getWeekDates(baseDate),[baseDate]);
  const isThisWeek=weekOff===0;

  const getDayTasks=date=>{
    const dk=getDK(date);
    if(!tasks[dk]){const def=genTasks(date,keywords,personas);setTasks(p=>({...p,[dk]:def}));return def}
    return tasks[dk];
  };

  const allDays=wd.map(d=>({date:d,dk:getDK(d),tasks:getDayTasks(d)}));
  const sel=allDays[selIdx]||allDays[0];
  const dk=sel.dk;

  const updateTask=(dk,id,up)=>setTasks(p=>({...p,[dk]:(p[dk]||[]).map(t=>t.id===id?{...t,...up}:t)}));
  const deleteTask=(dk,id)=>setTasks(p=>({...p,[dk]:(p[dk]||[]).filter(t=>t.id!==id)}));
  const addTask=(dk,task)=>setTasks(p=>({...p,[dk]:[...(p[dk]||[]),task]}));
  const copy=(txt,id)=>{navigator.clipboard?.writeText(txt);setCopyId(id);setTimeout(()=>setCopyId(''),1500)};

  // Carry-over
  const carry=useMemo(()=>{
    if(!isThisWeek)return[];const c=[];const ti=now.getDay()-1;
    for(let i=0;i<ti&&i<selIdx;i++){(allDays[i]?.tasks||[]).forEach(t=>{if(!t.done&&t.p==='P0'&&t.type!=='meet')c.push({...t,from:DN[allDays[i].date.getDay()]+'요일'})})}
    return c;
  },[allDays,selIdx,isThisWeek]);

  const user=USERS.find(u=>u.id===curUser);
  const dTasks=sel.tasks;const dDone=dTasks.filter(t=>t.done).length;
  const dPct=dTasks.length?Math.round(dDone/dTasks.length*100):0;
  const wTasks=allDays.flatMap(d=>d.tasks);const wDone=wTasks.filter(t=>t.done).length;
  const wPct=wTasks.length?Math.round(wDone/wTasks.length*100):0;

  // Export
  const doExport=()=>{
    const d=S.exportAll();const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`리셋회생_백업_${todayDK}.json`;a.click();URL.revokeObjectURL(u);
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

</style></head><body>

<h2>성과 기록</h2>
${perfRecords.length?`<table><tr><th>날짜</th><th>제목</th><th>수치</th><th>상세</th></tr>
${perfRecords.map(r=>`<tr><td>${r.date}</td><td>${r.title}</td><td>${r.amount||'-'}</td><td>${r.detail||'-'}</td></tr>`).join('')}</table>`:'<p>데이터 없음</p>'}

<div class="footer">리셋회생 마케팅 커맨드센터 · 자동 생성 리포트 · ${new Date().toLocaleString('ko-KR')}</div>

    const blob=new Blob([html],{type:'text/html'});const url=URL.createObjectURL(blob);

  return(

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,position:'relative'}}>
          <div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <h1 style={{fontSize:18,fontWeight:900,letterSpacing:'-.02em'}}>⚡ 리셋회생 마케팅</h1>

/* ═══ TASK CARD ═══ */
function TaskCard({task,dk,updateTask,deleteTask,copy,copyId}){
  const[exp,setExp]=useState(false);
  const[editing,setEditing]=useState(false);
  const[et,setEt]=useState(task.title);
  const d=task.done;
  const tm={blog:{l:'블로그',c:'#6c5ce7',bg:'#f4f2ff'},cafe:{l:'카페',c:'#a29bfe',bg:'#f0eeff'},seo:{l:'SEO',c:'#e17055',bg:'#ffeaa7'},meet:{l:'미팅',c:'#00b894',bg:'#e6fcf5'},dev:{l:'개발',c:'#fd79a8',bg:'#fff0f6'},check:{l:'검수',c:'#636e72',bg:'#f5f6fa'}};
  const ti=tm[task.type]||tm.check;const u=USERS.find(u=>u.id===task.who)||{name:'전원',em:'👥'};
  return(
    <div className="card" style={{borderLeft:`4px solid ${d?'#22c55e':ti.c}`,opacity:d?.55:1}}>
      <div style={{padding:'12px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
        <button onClick={()=>updateTask(dk,task.id,{done:!d})} style={{width:28,height:28,borderRadius:9,border:`2px solid ${d?'var(--success)':'var(--text4)'}`,background:d?'linear-gradient(135deg,var(--success),var(--teal))':'#fff',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:13,fontWeight:700,flexShrink:0,cursor:'pointer',transition:'all .2s cubic-bezier(.4,0,.2,1)',boxShadow:d?'0 2px 8px rgba(0,184,148,.3)':'none'}}>{d?'✓':''}</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:4}}>
            <span className="tag" style={{background:task.p==='P0'?'#fef2f2':'#fffbeb',color:task.p==='P0'?'#dc2626':'#d97706'}}>{task.p==='P0'?'필수':'중요'}</span>
            <span className="tag" style={{background:ti.bg,color:ti.c}}>{ti.l}</span>
            <span className="tag" style={{background:'#f8fafc',color:'var(--text3)'}}>{u.em} {u.name} · {task.min}분</span>
          </div>
          {editing?<div style={{display:'flex',gap:4}}><input value={et} onChange={e=>setEt(e.target.value)} className="input" style={{padding:'6px 10px',fontSize:13}} onKeyDown={e=>e.key==='Enter'&&(updateTask(dk,task.id,{title:et}),setEditing(false))}/><button onClick={()=>{updateTask(dk,task.id,{title:et});setEditing(false)}} className="btn btn-primary" style={{padding:'6px 12px',fontSize:11}}>저장</button></div>
          :<p onClick={()=>setExp(!exp)} style={{fontSize:14,fontWeight:700,textDecoration:d?'line-through':'none',color:d?'var(--text3)':'var(--text)',cursor:'pointer',lineHeight:1.35}}>{task.title}</p>}
          <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
            <button onClick={()=>setExp(!exp)} className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11}}>{exp?'▲ 접기':'▼ 가이드'}</button>
            {task.prompt&&<button onClick={()=>copy(task.prompt,task.id)} className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11,color:'var(--primary)'}}>{copyId===task.id?'✅ 복사됨':'📋 프롬프트'}</button>}
            <button onClick={()=>{setEditing(true);setEt(task.title)}} className="btn btn-ghost" style={{padding:'4px 8px',fontSize:11}}>✏️</button>
            <button onClick={()=>confirm('삭제?')&&deleteTask(dk,task.id)} className="btn btn-danger" style={{padding:'4px 8px',fontSize:11}}>🗑</button>
          </div>
        </div>
      </div>
      <div className={`expandable ${exp?'open':''}`}>
        <div style={{padding:'0 14px 14px',borderTop:'1px solid #f1f5f9'}}>
          <p style={{fontSize:12,fontWeight:700,color:'var(--primary)',margin:'12px 0 10px'}}>📖 실행 가이드</p>
          {(task.guide||[]).map((g,i)=><div key={i} style={{display:'flex',gap:10,marginBottom:10}}><div className="step-num" style={{background:ti.c,marginTop:1}}>{i+1}</div><div><p style={{fontSize:13,fontWeight:700}}>{g.step}</p><p style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{g.detail}</p></div></div>)}
          {task.prompt&&<div className="prompt-box"><p style={{fontSize:10,fontWeight:700,color:'var(--primary)',marginBottom:6}}>💻 프롬프트:</p><pre>{task.prompt}</pre><button className="copy-btn" onClick={()=>copy(task.prompt,task.id+'p')}>{copyId===task.id+'p'?'✅':'📋'}</button></div>}
        </div>
      </div>
    </div>
  );
}

/* ═══ WEEK VIEW ═══ */

      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:40,height:40,borderRadius:12,background:p===100?'#ecfdf5':isT?'#fffbeb':'#f8fafc',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:9,fontWeight:700,color:isT?'#d97706':'var(--text3)'}}>{DN[day.date.getDay()]}{isT?' ★':''}</span>

            {day.tasks.some(t=>t.type==='dev')&&<span style={{color:'#ea580c',fontWeight:600}}>🛠️</span>}
            {day.tasks.some(t=>t.type==='meet')&&<span style={{color:'#059669',fontWeight:600}}>📋</span>}
          </div>
          <p style={{fontSize:11,color:'var(--text3)'}}>✅{dn}/{day.tasks.length}</p>

              <select value={post.status} onChange={e=>updatePost(post.id,{status:e.target.value})} style={{fontSize:11,padding:'5px 8px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',fontWeight:600}}>
                {['게시완료','댓글대응중','반응좋음🔥','삭제됨','신고당함⚠️'].map(s=><option key={s}>{s}</option>)}
              </select>
            </div>
            <input value={post.notes||''} onChange={e=>updatePost(post.id,{notes:e.target.value})} placeholder="메모..." className="input" style={{marginTop:6,padding:'8px 12px',fontSize:12}}/>
          </div>
        </div>)}
      </div>}
    </div>}

    {sub==='personas'&&<div>
      <div className="card" style={{padding:14,background:'linear-gradient(135deg,#fffbeb,#fef3c7)',borderColor:'#fde68a'}}>
        <p style={{fontSize:13,fontWeight:700,color:'#92400e'}}>💡 같은 카페 다른 계정 → 2~3일 간격 · IP 분리(와이파이/데이터) · 서로 댓글 OK</p>
      </div>
      <p style={{fontSize:11,color:'var(--text3)',padding:'4px',marginBottom:6}}>편집은 ⚙️ 설정 탭에서</p>
      {personas.map((pp,i)=>{const cnt=posts.filter(x=>x.persona===pp.id).length;
        return <div key={i} className="card" style={{borderLeft:`4px solid ${pp.color}`}}><div style={{padding:14}}>
          <div style={{display:'flex',gap:10,alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:30}}>{pp.emoji}</span>
            <div style={{flex:1}}><p style={{fontSize:15,fontWeight:800,color:pp.color}}>{pp.name}</p><p style={{fontSize:12,color:'var(--text2)'}}>{pp.age} · {pp.job}</p></div>
            <span style={{fontSize:14,fontWeight:900,color:pp.color}}>{cnt}편</span>

          <div style={{background:'#f8fafc',borderRadius:10,padding:12,fontSize:12,lineHeight:1.6}}>
            <p><strong style={{color:'var(--primary)'}}>배경</strong> {pp.background}</p>
            <p><strong style={{color:'var(--primary)'}}>말투</strong> {pp.tone}</p>
            <p><strong style={{color:'var(--primary)'}}>분위기</strong> {pp.style}</p>

          <div style={{marginTop:8,background:pp.color+'08',borderRadius:8,padding:'8px 12px'}}>
            <p style={{fontSize:11,fontWeight:600,color:pp.color}}>📅 {i===0?'월·목 → 상담후기':i===1?'화·금 → 정보/해결후기':'수·토 → 공감형'}</p>

}

/* ═══ MEMO ═══ */
function MemoView({memos,setMemos,curUser}){
  const[txt,setTxt]=useState('');const[sq,setSq]=useState('');
  const u=USERS.find(x=>x.id===curUser);
  const add=()=>{if(!txt.trim())return;setMemos(p=>[{id:Date.now(),text:txt,user:curUser,name:u.name,em:u.em,time:new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'}),pin:false},...p]);setTxt('')};
  const f=memos.filter(m=>!sq||m.text.includes(sq)||m.name.includes(sq));

  return(<div>
    <div className="card" style={{padding:14}}>
      <textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder="메모 입력... (Ctrl+Enter 저장)" className="input" style={{minHeight:70,resize:'vertical',marginBottom:6}} onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))add()}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:11,color:'var(--text3)'}}>{u.em} {u.name}</span>
        <button onClick={add} className="btn btn-primary" style={{padding:'8px 20px'}}>저장</button>
      </div>
    </div>
    {memos.length>3&&<input value={sq} onChange={e=>setSq(e.target.value)} placeholder="🔍 검색..." className="input" style={{marginBottom:8,fontSize:12}}/>}
    {f.filter(m=>m.pin).map(m=><MC key={m.id} m={m} setMemos={setMemos}/>)}
    {f.filter(m=>!m.pin).map(m=><MC key={m.id} m={m} setMemos={setMemos}/>)}
    {f.length===0&&<div style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}><p style={{fontSize:24}}>📝</p><p style={{fontSize:13,marginTop:4}}>{memos.length?'검색 결과 없음':'메모 없음'}</p></div>}
  </div>);
}
function MC({m,setMemos}){
  return <div className="card" style={{padding:12,background:m.pin?'#fffbeb':'#fff',borderColor:m.pin?'#fde68a':'var(--border2)'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div style={{flex:1}}>
        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:3}}>
          {m.pin&&<span style={{fontSize:10}}>📌</span>}
          <span style={{fontSize:11,fontWeight:600}}>{m.em} {m.name}</span>
          <span style={{fontSize:9,color:'var(--text3)'}}>{m.time}</span>
        </div>
        <p style={{fontSize:13,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{m.text}</p>
      </div>
      <div style={{display:'flex',gap:3}}>
        <button onClick={()=>setMemos(p=>p.map(x=>x.id===m.id?{...x,pin:!x.pin}:x))} style={{width:24,height:24,borderRadius:6,border:'1px solid var(--border)',background:m.pin?'#fef08a':'#fff',fontSize:10,cursor:'pointer'}}>📌</button>
        <button onClick={()=>confirm('삭제?')&&setMemos(p=>p.filter(x=>x.id!==m.id))} style={{width:24,height:24,borderRadius:6,border:'1px solid #fecaca',background:'#fff',fontSize:10,color:'#ef4444',cursor:'pointer'}}>✕</button>
      </div>
    </div>
  </div>;
}

/* ═══ RECORD VIEW ═══ */
function RecordView({records,setRecords,exportReport}){
  const[type,setType]=useState('성과');const[title,setTitle]=useState('');const[detail,setDetail]=useState('');const[amount,setAmount]=useState('');
  const[sq,setSq]=useState('');const[ft,setFt]=useState('all');
  const types=[{n:'성과',ic:'📈',c:'#22c55e'},{n:'비용',ic:'💰',c:'#ef4444'},{n:'팁',ic:'💡',c:'#f59e0b'},{n:'아이디어',ic:'🧠',c:'#8b5cf6'},{n:'이슈',ic:'⚠️',c:'#0ea5e9'}];
  const add=()=>{if(!title.trim())return;setRecords(p=>[{id:Date.now(),type,title,detail,amount:amount||null,date:new Date().toLocaleDateString('ko-KR')},...p]);setTitle('');setDetail('');setAmount('')};
  const filtered=records.filter(r=>(ft==='all'||r.type===ft)&&(!sq||r.title.includes(sq)||(r.detail||'').includes(sq)));
  const tc=types.map(t=>({...t,cnt:records.filter(r=>r.type===t.n).length}));const mx=Math.max(...tc.map(t=>t.cnt),1);

  return(<div>
    {records.length>0&&<div className="card" style={{padding:18}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <p style={{fontSize:16,fontWeight:800}}>📊 성과 대시보드</p>
        <button onClick={exportReport} className="btn btn-accent" style={{fontSize:11,padding:'8px 16px'}}>📄 리포트 다운로드</button>
      </div>
      {/* Donut Chart + Stats */}
      <div style={{display:'flex',gap:16,alignItems:'center',marginBottom:16,flexWrap:'wrap',justifyContent:'center'}}>
        <svg width="130" height="130" viewBox="0 0 130 130" style={{flexShrink:0}}>
          {(()=>{const total=tc.reduce((s,t)=>s+t.cnt,0)||1;let cum=0;
            return tc.filter(t=>t.cnt>0).map((t,i)=>{
              const pct=t.cnt/total;const r=50;const cx=65;const cy=65;
              const startAngle=cum*2*Math.PI-Math.PI/2;
              cum+=pct;
              const endAngle=cum*2*Math.PI-Math.PI/2;
              const large=pct>0.5?1:0;
              const x1=cx+r*Math.cos(startAngle);const y1=cy+r*Math.sin(startAngle);
              const x2=cx+r*Math.cos(endAngle);const y2=cy+r*Math.sin(endAngle);
              return <path key={i} d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`} fill={t.c} opacity=".85" stroke="#fff" strokeWidth="2"/>;
            });
          })()}
          <circle cx="65" cy="65" r="30" fill="white"/>
          <text x="65" y="60" textAnchor="middle" fontSize="22" fontWeight="900" fill="var(--primary)">{records.length}</text>
          <text x="65" y="76" textAnchor="middle" fontSize="9" fill="var(--text3)" fontWeight="600">총 기록</text>
        </svg>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,flex:1,minWidth:180}}>
          {tc.map((t,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 10px',background:t.c+'0d',borderRadius:10,border:`1px solid ${t.c}15`}}>
            <div style={{width:10,height:10,borderRadius:3,background:t.c,flexShrink:0}}/>
            <div><p style={{fontSize:12,fontWeight:800,color:t.c}}>{t.cnt}건</p><p style={{fontSize:10,color:'var(--text3)'}}>{t.ic} {t.n}</p></div>
          </div>)}
        </div>
      </div>
      {/* Bar Chart */}
      {tc.map((t,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
        <span style={{fontSize:11,width:50,textAlign:'right',color:'var(--text2)',fontWeight:700}}>{t.ic}{t.n}</span>
        <div style={{flex:1,height:20,background:'var(--bg2)',borderRadius:8,overflow:'hidden'}}><div className="chart-bar" style={{width:`${(t.cnt/mx)*100}%`,background:`linear-gradient(90deg,${t.c},${t.c}99)`,boxShadow:`0 2px 6px ${t.c}33`}}/></div>
        <span style={{fontSize:12,fontWeight:900,color:t.c,width:28,textAlign:'right'}}>{t.cnt}</span>
      </div>)}
    </div>}

    <div className="card" style={{padding:14}}>
      <p style={{fontSize:15,fontWeight:800,marginBottom:10}}>＋ 기록 추가</p>
      <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap'}}>
        {types.map(t=><button key={t.n} onClick={()=>setType(t.n)} style={{padding:'6px 12px',borderRadius:8,border:'none',fontSize:11,fontWeight:600,background:type===t.n?t.c+'18':'#f1f5f9',color:type===t.n?t.c:'var(--text2)',cursor:'pointer'}}>{t.ic} {t.n}</button>)}
      </div>
      <input value={title} onChange={e=>setTitle(e.target.value)} placeholder="제목" className="input" style={{marginBottom:5}} onKeyDown={e=>e.key==='Enter'&&add()}/>
      <div style={{display:'flex',gap:4}} className="col-m">
        <textarea value={detail} onChange={e=>setDetail(e.target.value)} placeholder="상세 (선택)" className="input" style={{minHeight:50,resize:'vertical',flex:1}}/>
        {(type==='비용'||type==='성과')&&<input value={amount} onChange={e=>setAmount(e.target.value)} placeholder="금액/수치" className="input" style={{width:100}}/>}
      </div>
      <button onClick={add} className="btn btn-primary" style={{width:'100%',marginTop:6}}>기록 추가</button>
    </div>

    {records.length>3&&<div style={{display:'flex',gap:4,marginBottom:8}} className="col-m">
      <input value={sq} onChange={e=>setSq(e.target.value)} placeholder="🔍 검색..." className="input" style={{flex:1,fontSize:12}}/>
      <select value={ft} onChange={e=>setFt(e.target.value)} style={{padding:'8px 12px',borderRadius:11,border:'1.5px solid var(--border)',fontSize:12,background:'#fff'}}><option value="all">전체</option>{types.map(t=><option key={t.n} value={t.n}>{t.ic} {t.n}</option>)}</select>
    </div>}

    {filtered.map(r=>{const rt=types.find(t=>t.n===r.type)||types[0];return <div key={r.id} className="card" style={{padding:12,borderLeft:`4px solid ${rt.c}`}}>
      <div style={{display:'flex',justifyContent:'space-between'}}>
        <div style={{flex:1}}><div style={{display:'flex',gap:4,marginBottom:3}}><span className="tag" style={{background:rt.c+'18',color:rt.c}}>{rt.ic} {r.type}</span><span style={{fontSize:10,color:'var(--text3)'}}>{r.date}</span></div>
          <p style={{fontSize:14,fontWeight:700}}>{r.title}</p>{r.detail&&<p style={{fontSize:12,color:'var(--text2)',marginTop:2}}>{r.detail}</p>}</div>
        <div style={{display:'flex',alignItems:'flex-start',gap:4}}>{r.amount&&<span style={{fontSize:13,fontWeight:800,color:rt.c}}>{r.amount}</span>}
          <button onClick={()=>confirm('삭제?')&&setRecords(p=>p.filter(x=>x.id!==r.id))} style={{width:22,height:22,borderRadius:6,border:'1px solid #fecaca',background:'#fff',fontSize:9,color:'#ef4444',cursor:'pointer'}}>✕</button></div>
      </div>
    </div>})}
    {filtered.length===0&&records.length>0&&<div style={{textAlign:'center',padding:'30px',color:'var(--text3)'}}><p>검색 결과 없음</p></div>}
  </div>);
}

/* ═══ SETTINGS ═══ */
function SettingsView({keywords,setKeywords,personas,setPersonas,doExport,doImport,fileRef,cloudCfg,setCloudCfg,cloudRoom,setCloudRoom,syncMsg,setSyncMsg,cloudPush}){
  const[nk,setNk]=useState('');const[ep,setEp]=useState(null);const[pf,setPf]=useState({});
  const[clipTxt,setClipTxt]=useState('');const[clipCopied,setClipCopied]=useState(false);
  const[showGuide,setShowGuide]=useState(false);
  const[fbCfgTxt,setFbCfgTxt]=useState(cloudCfg?JSON.stringify(cloudCfg,null,2):'');
  const[fbRoom,setFbRoom]=useState(cloudRoom||('rh-'+Math.random().toString(36).slice(2,10)));
  const[fbStatus,setFbStatus]=useState(Cloud.active?'connected':'disconnected');

  const addKw=()=>{if(!nk.trim()||keywords.includes(nk.trim()))return;setKeywords(p=>[...p,nk.trim()]);setNk('')};
  const startEdit=(p,i)=>{setEp(i);setPf({...p})};
  const saveP=()=>{setPersonas(p=>p.map((x,i)=>i===ep?{...pf}:x));setEp(null)};
  const addP=()=>setPersonas(p=>[...p,{id:'acc'+(p.length+1),name:`계정${p.length+1}: 새계정`,age:'',job:'',emoji:'👤',color:'#6366f1',tone:'',background:'',style:''}]);
  const delP=i=>{if(personas.length<=1)return alert('최소 1개');if(confirm('삭제?'))setPersonas(p=>p.filter((_,j)=>j!==i))};

  // Clipboard sync
  const handleClipCopy=async()=>{const ok=await ClipSync.copyToClip();setClipCopied(ok);setTimeout(()=>setClipCopied(false),2500)};
  const handleClipRestore=()=>{if(!clipTxt.trim())return;const ok=ClipSync.restore(clipTxt);if(ok){alert('복원 성공! 새로고침합니다.');location.reload()}else{alert('데이터 형식 오류. 복사한 텍스트를 정확히 붙여넣으세요.')}};

  // Firebase connect
  const handleFirebaseConnect=()=>{
    try{
      const cfg=JSON.parse(fbCfgTxt);
      const ok=Cloud.init(cfg,fbRoom);
      if(ok){
        setCloudCfg(cfg);setCloudRoom(fbRoom);setFbStatus('connected');
        setSyncMsg('Firebase 연결 성공!');setTimeout(()=>setSyncMsg(''),2500);
        Cloud.push();
      }else{setFbStatus('error');setSyncMsg('연결 실패')}
    }catch{setSyncMsg('설정 JSON 형식 오류');setFbStatus('error')}
  };
  const handleFirebasePull=()=>{
    if(!Cloud.active)return;
    setSyncMsg('데이터 내려받는 중...');
    Cloud.pull().then(d=>{if(d){setSyncMsg('동기화 완료! 새로고침합니다.');setTimeout(()=>location.reload(),800)}else{setSyncMsg('서버에 데이터 없음')}});
  };
  const handleFirebasePush=()=>{
    if(!Cloud.active)return;
    setSyncMsg('업로드 중...');
    Cloud.push().then(ok=>{setSyncMsg(ok?'업로드 완료!':'업로드 실패');setTimeout(()=>setSyncMsg(''),2000)});
  };
  const handleFirebaseDisconnect=()=>{Cloud.disconnect();setCloudCfg(null);setCloudRoom('');setFbStatus('disconnected');setSyncMsg('')};

  return(<div>
    {/* ── Quick Sync (Clipboard) ── */}
    <div className="card" style={{padding:16,borderLeft:'4px solid var(--accent)'}}>
      <p style={{fontSize:15,fontWeight:800,marginBottom:4}}>📋 빠른 동기화 (클립보드)</p>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:12,lineHeight:1.7}}>설정 없이 바로 사용 가능. 데이터를 텍스트로 복사해서 카카오톡 "나에게 보내기"나 메모앱으로 다른 기기에 전달하세요.</p>
      <div style={{display:'flex',gap:6,marginBottom:10}} className="col-m">
        <button onClick={handleClipCopy} className="btn btn-primary" style={{flex:1,padding:'12px'}}>{clipCopied?'✅ 복사 완료!':'📋 데이터 복사'}</button>
      </div>
      <div style={{background:'#f8f9fc',borderRadius:10,padding:12,marginBottom:6}}>
        <p style={{fontSize:11,fontWeight:700,color:'var(--primary)',marginBottom:6}}>📱 다른 기기에서 복원하기</p>
        <textarea value={clipTxt} onChange={e=>setClipTxt(e.target.value)} placeholder="다른 기기에서 복사한 데이터를 여기에 붙여넣기..." className="input" style={{minHeight:60,resize:'vertical',fontSize:12,marginBottom:6}}/>
        <button onClick={handleClipRestore} className="btn btn-accent" style={{width:'100%'}} disabled={!clipTxt.trim()}>📲 붙여넣기로 복원</button>
      </div>
      <div style={{background:'#fffbeb',borderRadius:8,padding:10,border:'1px solid #fde68a'}}>
        <p style={{fontSize:11,fontWeight:700,color:'#92400e',marginBottom:4}}>💡 사용법</p>
        <p style={{fontSize:11,color:'#854d0e',lineHeight:1.8}}>
          ① "데이터 복사" 클릭 → 데이터가 클립보드에 복사됨<br/>
          ② 카카오톡 "나에게 보내기"에 붙여넣기 → 전송<br/>
          ③ 다른 기기(폰/PC)에서 이 대시보드 열기<br/>
          ④ 카톡에서 텍스트 복사 → 위 입력창에 붙여넣기<br/>
          ⑤ "붙여넣기로 복원" 클릭 → 완료!
        </p>
      </div>
    </div>

    {/* ── Cloud Sync (Firebase) ── */}
    <div className="card" style={{padding:16,borderLeft:'4px solid #f59e0b'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <p style={{fontSize:15,fontWeight:800}}>☁️ 클라우드 동기화</p>
        <span style={{fontSize:11,padding:'3px 10px',borderRadius:8,fontWeight:700,
          background:fbStatus==='connected'?'#ecfdf5':fbStatus==='error'?'#fef2f2':'#f8fafc',
          color:fbStatus==='connected'?'#059669':fbStatus==='error'?'#ef4444':'#94a3b8'}}>
          {fbStatus==='connected'?'🟢 연결됨':fbStatus==='error'?'🔴 오류':'⚪ 미연결'}
        </span>
      </div>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:12,lineHeight:1.7}}>
        Firebase(무료)를 연결하면 여러 기기에서 자동으로 데이터가 동기화됩니다. 링크(방 키)를 아는 사람만 접근 가능합니다.
      </p>

      {fbStatus==='connected'?<div>
        <div style={{background:'#ecfdf5',borderRadius:10,padding:12,marginBottom:8}}>
          <p style={{fontSize:12,fontWeight:700,color:'#065f46',marginBottom:4}}>✅ 클라우드 연결됨</p>
          <p style={{fontSize:11,color:'#047857'}}>방 키: <code style={{background:'#d1fae5',padding:'2px 6px',borderRadius:4,fontWeight:700}}>{cloudRoom}</code></p>
        </div>
        {syncMsg&&<p style={{fontSize:12,fontWeight:600,color:'var(--primary)',marginBottom:8,textAlign:'center'}}>{syncMsg}</p>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
          <button onClick={handleFirebasePush} className="btn btn-primary" style={{justifyContent:'center'}}>⬆️ 업로드</button>
          <button onClick={handleFirebasePull} className="btn btn-success" style={{justifyContent:'center'}}>⬇️ 내려받기</button>
        </div>
        <button onClick={handleFirebaseDisconnect} className="btn btn-danger" style={{width:'100%'}}>연결 해제</button>
      </div>
      :<div>
        <button onClick={()=>setShowGuide(!showGuide)} className="btn btn-ghost" style={{width:'100%',marginBottom:10}}>
          {showGuide?'▲ 가이드 접기':'📖 Firebase 무료 설정 가이드 (5분)'}
        </button>

        {showGuide&&<div style={{background:'#f8f9fc',borderRadius:12,padding:14,marginBottom:12,border:'1px solid var(--border)'}}>
          <p style={{fontSize:13,fontWeight:800,color:'var(--primary)',marginBottom:10}}>🔥 Firebase 무료 설정 (한번만 하면 끝!)</p>
          <div style={{fontSize:12,color:'var(--text)',lineHeight:2}}>
            {[
              {s:'1️⃣',t:'firebase.google.com 접속 → "시작하기"'},
              {s:'2️⃣',t:'Google 계정 로그인 (Gmail 계정이면 OK)'},
              {s:'3️⃣',t:'"프로젝트 추가" → 이름 아무거나 (예: "reset-marketing") → 만들기'},
              {s:'4️⃣',t:'왼쪽 메뉴 "빌드" → "Realtime Database" → "데이터베이스 만들기"'},
              {s:'5️⃣',t:'위치: "싱가포르" 선택 → "테스트 모드에서 시작" 선택 → 사용 설정'},
              {s:'6️⃣',t:'프로젝트 설정(톱니바퀴⚙️) → 일반 → 하단 "앱 추가" → 웹(</>) 아이콘'},
              {s:'7️⃣',t:'앱 이름 아무거나 → "등록" → 나오는 firebaseConfig 코드 복사'},
            ].map((x,i)=><div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',marginBottom:4}}>
              <span style={{flexShrink:0,fontSize:13}}>{x.s}</span>
              <span>{x.t}</span>
            </div>)}
          </div>
          <div style={{marginTop:8,background:'#fffbeb',borderRadius:8,padding:10}}>
            <p style={{fontSize:11,fontWeight:700,color:'#92400e'}}>⚠️ 7번에서 복사할 코드 예시:</p>
            <pre style={{fontSize:10,color:'#854d0e',marginTop:4,lineHeight:1.6,whiteSpace:'pre-wrap'}}>{`{
  "apiKey": "AIzaSy...",
  "authDomain": "reset-marketing.firebaseapp.com",
  "databaseURL": "https://reset-marketing-default-rtdb.asia-southeast1.firebasedatabase.app",
  "projectId": "reset-marketing",
  "storageBucket": "reset-marketing.appspot.com",
  "messagingSenderId": "123456789",
  "appId": "1:123456789:web:abc..."
}`}</pre>
          </div>
        </div>}

        <div style={{marginBottom:8}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text2)',display:'block',marginBottom:4}}>Firebase 설정 (JSON)</label>
          <textarea value={fbCfgTxt} onChange={e=>setFbCfgTxt(e.target.value)} placeholder='Firebase 콘솔에서 복사한 config를 붙여넣기...' className="input" style={{minHeight:80,resize:'vertical',fontSize:11,fontFamily:'monospace'}}/>
        </div>
        <div style={{marginBottom:10}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text2)',display:'block',marginBottom:4}}>방 키 (같은 키를 사용하는 기기끼리 동기화)</label>
          <input value={fbRoom} onChange={e=>setFbRoom(e.target.value)} className="input" style={{fontSize:13,fontFamily:'monospace'}}/>
          <p style={{fontSize:10,color:'var(--text3)',marginTop:3}}>자동 생성됨. 다른 기기에서도 동일한 방 키를 입력하세요.</p>
        </div>
        {syncMsg&&<p style={{fontSize:12,fontWeight:600,color:'var(--danger)',marginBottom:8,textAlign:'center'}}>{syncMsg}</p>}
        <button onClick={handleFirebaseConnect} className="btn btn-primary" style={{width:'100%',padding:'14px'}} disabled={!fbCfgTxt.trim()}>🔗 Firebase 연결</button>
      </div>}
    </div>

    {/* ── Backup ── */}
    <div className="card" style={{padding:16}}>
      <p style={{fontSize:15,fontWeight:800,marginBottom:10}}>💾 백업 관리</p>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:10,lineHeight:1.6}}>모든 데이터가 브라우저에 자동 저장됩니다. 60초마다 자동 백업 스냅샷이 생성됩니다.</p>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        <button onClick={doExport} className="btn btn-primary" style={{flex:1}}>📥 JSON 백업</button>
        <button onClick={()=>fileRef.current?.click()} className="btn btn-success" style={{flex:1}}>📤 JSON 복원</button>
        <input ref={fileRef} type="file" accept=".json" onChange={doImport} style={{display:'none'}}/>
      </div>
      <button onClick={()=>confirm('모든 데이터가 삭제됩니다! 백업을 먼저 해주세요.')&&(S.clear(),location.reload())} className="btn btn-danger" style={{width:'100%',marginTop:8}}>⚠️ 전체 초기화</button>
    </div>

    {/* ── Keywords ── */}
    <div className="card" style={{padding:16}}>
      <p style={{fontSize:15,fontWeight:800,marginBottom:10}}>🔑 키워드 풀 ({keywords.length}개)</p>
      <div style={{display:'flex',gap:4,marginBottom:10}}>
        <input value={nk} onChange={e=>setNk(e.target.value)} placeholder="새 키워드" className="input" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addKw()}/>
        <button onClick={addKw} className="btn btn-primary">추가</button>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
        {keywords.map((kw,i)=><span key={i} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 10px',background:'#f1f5f9',borderRadius:8,fontSize:11}}>
          {kw}<button onClick={()=>setKeywords(p=>p.filter(x=>x!==kw))} style={{width:18,height:18,borderRadius:4,border:'none',background:'#fecaca',color:'#dc2626',fontSize:9,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </span>)}
      </div>
    </div>

    {/* ── Personas ── */}
    <div className="card" style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <p style={{fontSize:15,fontWeight:800}}>🎭 계정 ({personas.length}개)</p>
        <button onClick={addP} className="btn btn-primary" style={{fontSize:11,padding:'6px 14px'}}>＋ 추가</button>
      </div>
      {personas.map((pp,i)=><div key={i} style={{background:'#f8fafc',borderRadius:12,padding:12,marginBottom:8,border:`1.5px solid ${pp.color}22`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:22}}>{pp.emoji}</span>
            <div><p style={{fontSize:13,fontWeight:700,color:pp.color}}>{pp.name}</p><p style={{fontSize:11,color:'var(--text2)'}}>{pp.age} · {pp.job}</p></div>
          </div>
          <div style={{display:'flex',gap:3}}>
            <button onClick={()=>startEdit(pp,i)} className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11}}>✏️</button>
            <button onClick={()=>delP(i)} className="btn btn-danger" style={{padding:'4px 8px',fontSize:11}}>🗑</button>
          </div>
        </div>
      </div>)}
    </div>

    {/* Persona Modal */}
    {ep!==null&&<div className="modal-overlay" onClick={()=>setEp(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <p style={{fontSize:16,fontWeight:800,marginBottom:16}}>🎭 페르소나 편집</p>
      {[{k:'name',l:'계정명',ph:'계정1: 민지'},{k:'emoji',l:'이모지',ph:'👩'},{k:'color',l:'색상',ph:'#ec4899'},{k:'age',l:'나이/성별',ph:'32세 여성'},{k:'job',l:'직업',ph:'중소기업 경리'},
        {k:'tone',l:'말투',ph:'~거든요 체...',a:1},{k:'background',l:'배경',ph:'채무 상황...',a:1},{k:'style',l:'스타일',ph:'소심한 느낌...',a:1}
      ].map(f=><div key={f.k} style={{marginBottom:8}}>
        <label style={{fontSize:11,fontWeight:700,color:'var(--primary)',display:'block',marginBottom:3}}>{f.l}</label>
        {f.a?<textarea value={pf[f.k]||''} onChange={e=>setPf(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} className="input" style={{minHeight:55,resize:'vertical'}}/>
        :<input value={pf[f.k]||''} onChange={e=>setPf(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} className="input"/>}
      </div>)}
      <div style={{display:'flex',gap:6,marginTop:12}}>
        <button onClick={saveP} className="btn btn-primary" style={{flex:1}}>저장</button>
        <button onClick={()=>setEp(null)} className="btn btn-ghost" style={{flex:1}}>취소</button>
      </div>
    </div></div>}

    <div className="card" style={{padding:14,background:'linear-gradient(135deg,#ecfdf5,#d1fae5)',borderColor:'#bbf7d0'}}>
      <p style={{fontSize:13,fontWeight:700,color:'#065f46'}}>✅ 자동 저장 활성</p>
      <p style={{fontSize:12,color:'#047857',lineHeight:1.6}}>모든 변경 즉시 저장 · 60초 자동 백업 · 클립보드/Firebase로 기기 간 동기화 가능</p>
    </div>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
