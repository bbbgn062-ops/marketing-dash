const{useState,useMemo,useCallback,useRef,useEffect}=React;

/* ═══ STORAGE ENGINE ═══ */
const S={
  _cache:{},
  get(k,d){
    if(this._cache[k]!==undefined)return this._cache[k];
    try{const v=localStorage.getItem('rh_'+k);const r=v?JSON.parse(v):d;this._cache[k]=r;return r}catch{return d}
  },
  set(k,v){this._cache[k]=v;try{localStorage.setItem('rh_'+k,JSON.stringify(v))}catch(e){console.warn('Storage full',e)}},
  exportAll(){
    const d={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('rh_'))d[k.slice(3)]=JSON.parse(localStorage.getItem(k))}
    d._exportDate=new Date().toISOString();d._version='v3';return d;
  },
  importAll(d){
    Object.entries(d).forEach(([k,v])=>{if(k.startsWith('_'))return;localStorage.setItem('rh_'+k,JSON.stringify(v));this._cache[k]=v});
  },
  clear(){const ks=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k.startsWith('rh_'))ks.push(k)}ks.forEach(k=>localStorage.removeItem(k));this._cache={}}
};

/* ═══ CLOUD SYNC (GitHub Gist) ═══ */
const Cloud={
  token:null,repo:'bbbgn062-ops/marketing-dash',path:'data.json',active:false,sha:null,
  init(token){
    this.token=token;this.active=!!(token);
    return this.active;
  },
  async push(){
    if(!this.active||!this.token)return false;
    const d=S.exportAll();d._pushTime=new Date().toISOString();
    try{
      // 먼저 기존 파일의 sha 가져오기
      const getRes=await fetch('https://api.github.com/repos/'+this.repo+'/contents/'+this.path,{
        headers:{'Authorization':'token '+this.token}
      });
      let sha=null;
      if(getRes.ok){const g=await getRes.json();sha=g.sha}
      const body={message:'sync: '+new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'}),content:btoa(unescape(encodeURIComponent(JSON.stringify(d,null,2))))};
      if(sha)body.sha=sha;
      const res=await fetch('https://api.github.com/repos/'+this.repo+'/contents/'+this.path,{
        method:'PUT',
        headers:{'Authorization':'token '+this.token,'Content-Type':'application/json'},
        body:JSON.stringify(body)
      });
      return res.ok;
    }catch(e){console.error('[Cloud] Push failed:',e);return false}
  },
  async pull(){
    if(!this.active||!this.token)return null;
    try{
      const res=await fetch('https://api.github.com/repos/'+this.repo+'/contents/'+this.path,{
        headers:{'Authorization':'token '+this.token}
      });
      if(!res.ok)return null;
      const g=await res.json();
      if(!g.content)return null;
      const json=decodeURIComponent(escape(atob(g.content.replace(/\n/g,''))));
      const d=JSON.parse(json);S.importAll(d);return d;
    }catch(e){console.error('[Cloud] Pull failed:',e);return null}
  },
  async test(){
    if(!this.token)return false;
    try{
      const res=await fetch('https://api.github.com/repos/'+this.repo,{
        headers:{'Authorization':'token '+this.token}
      });
      return res.ok;
    }catch(e){return false}
  },
  disconnect(){this.active=false;this.token=null}
};

/* ═══ CLIPBOARD SYNC ═══ */
const ClipSync={
  encode(){
    const d=S.exportAll();const j=JSON.stringify(d);
    return btoa(unescape(encodeURIComponent(j)));
  },
  decode(b64){
    try{const j=decodeURIComponent(escape(atob(b64.trim())));return JSON.parse(j)}
    catch(e){return null}
  },
  async copyToClip(){
    const code=this.encode();
    try{await navigator.clipboard.writeText(code);return true}
    catch{
      const ta=document.createElement('textarea');ta.value=code;ta.style.cssText='position:fixed;opacity:0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);return true;
    }
  },
  restore(b64){
    const d=this.decode(b64);if(!d)return false;
    S.importAll(d);return true;
  }
};

/* ═══ HOOK: persistent state ═══ */
function useP(key,def){
  const[val,setVal]=useState(()=>S.get(key,def));
  const update=useCallback(v=>{
    setVal(prev=>{const nv=typeof v==='function'?v(prev):v;S.set(key,nv);return nv});
  },[key]);
  return[val,update];
}

function detectKwType(kw){
  const k=kw.toLowerCase();
  if(k.includes('자격')||k.includes('조건')||k.includes('가능'))return 'eligibility';
  if(k.includes('비용')||k.includes('수임료')||k.includes('얼마'))return 'cost';
  if(k.includes('절차')||k.includes('순서')||k.includes('방법')||k.includes('신청'))return 'process';
  if(k.includes('면책')||k.includes('불이익')||k.includes('후'))return 'after';
  if(k.includes('vs')||k.includes('차이')||k.includes('비교'))return 'compare';
  if(k.includes('기각')||k.includes('실수')||k.includes('주의'))return 'caution';
  if(k.includes('변제금')||k.includes('계산')||k.includes('생계비'))return 'calc';
  if(k.includes('압류')||k.includes('급여')||k.includes('전세'))return 'asset';
  if(k.includes('무직')||k.includes('프리랜서')||k.includes('자영업'))return 'special';
  return 'general';
}

function genBlogGuide(kw,num){
  const seed=kw.length+num;
  const kwType=detectKwType(kw);
  const data=KW_DATA[kwType]||KW_DATA.general;
  const target=data.targets[seed%data.targets.length];
  const subtitles=data.subtitles(kw);
  const subtitle=subtitles[seed%subtitles.length];
  const tocItems=data.toc(kw);
  const toc=tocItems.map(t=>t.h);
  const tocDetail=tocItems.map(t=>({h:t.h,d:t.d}));
  const cautions=data.cautions||KW_DATA.general.cautions;
  const angle=['법적 절차 총정리','실제 사례 기반 설명','비용/기간 비교','자격조건 셀프체크','오해와 진실 바로잡기','전문가가 알려주는 팁'][(seed+2)%6];
  const cta=['무료상담 유도 (부담없이 전화 한 통)','체크리스트 다운로드 유도','관련 글 더보기 유도','댓글 질문 유도'][seed%4];
  const mainKw=kw.split(' ').slice(0,2).join('');
  const tags=[`#${mainKw}`,`#개인회생`,`#채무조정`,`#빚탕감`,`#리셋회생`,`#무료상담`,`#2026개인회생`,`#${kwType==='cost'?'수임료':kwType==='process'?'신청절차':kwType==='after'?'면책':kwType==='compare'?'비교':kwType==='calc'?'변제금':'개인파산'}`];
  const ltKws=[kw,`${kw} 방법`,`${kw} 비용`,`${kw} 후기`,`${kw} 자격`,`${kw} 기간`,`${kw} 서류`,`2026 ${kw}`];
  const intro=kwType==='eligibility'?`"나도 개인회생 할 수 있을까?" — ${kw} 검색하신 분이라면 지금 이 불안, 충분히 이해합니다.`:
    kwType==='cost'?`비용이 부담돼서 망설이고 계신가요? 오늘 ${kw} 관련 실제 금액을 투명하게 정리해드립니다.`:
    kwType==='process'?`처음이라 절차가 막막하신 거, 당연합니다. ${kw} 순서를 하나하나 따라가 보겠습니다.`:
    kwType==='after'?`"진짜 빚이 없어지나요?" — ${kw}에 대한 오해와 진실을 정리했습니다.`:
    kwType==='compare'?`어느 쪽이 나한테 맞는지, ${kw}를 기준별로 비교해봤습니다.`:
    `${kw}에 대해 처음 알아보시는 분을 위해 2026년 최신 기준으로 정리했습니다.`;

  return {subtitle,target,angle,toc,tocDetail,tags:tags.slice(0,7),ltKws,cta,cautions,intro,kwType};
}

    return()=>clearInterval(iv);

  const baseDate=useMemo(()=>{const d=new Date(now);d.setDate(d.getDate()+weekOff*7);return d},[weekOff]);

    const dk=getDK(date);

    return tasks[dk];

  const dk=sel.dk;

  const updateTask=(dk,id,up)=>setTasks(p=>({...p,[dk]:(p[dk]||[]).map(t=>t.id===id?{...t,...up}:t)}));
  const deleteTask=(dk,id)=>setTasks(p=>({...p,[dk]:(p[dk]||[]).filter(t=>t.id!==id)}));
  const addTask=(dk,task)=>setTasks(p=>({...p,[dk]:[...(p[dk]||[]),task]}));
  const copy=(txt,id)=>{navigator.clipboard?.writeText(txt);setCopyId(id);setTimeout(()=>setCopyId(''),1500)};

  // Carry-over
  const carry=useMemo(()=>{

      <div style={{marginBottom:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,padding:'12px 16px',background:'linear-gradient(135deg,#312e81,#4338ca)',borderRadius:'var(--radius)',boxShadow:'0 4px 20px rgba(67,56,202,.25)'}}>
          <div>
            <h1 style={{fontSize:20,fontWeight:800,color:'#fff',letterSpacing:'-.03em',display:'flex',alignItems:'center',gap:6}}>리셋회생 마케팅 <span className="live-dot"/></h1>
            <p style={{fontSize:12,color:'rgba(255,255,255,.7)',marginTop:2}}>
              {wd[0].getMonth()+1}/{wd[0].getDate()} ~ {wd[4].getMonth()+1}/{wd[4].getDate()}
              {isThisWeek&&` · ${getKoreanDate()}`}
            </p>
          </div>
          <div style={{position:'relative'}}>
            <button onClick={()=>setShowMenu(!showMenu)} style={{background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,padding:'7px 14px',color:'#fff',fontSize:12,fontWeight:600,cursor:'pointer',transition:'all .15s',backdropFilter:'blur(4px)'}}>
              {user.em} {user.name} ▾
            </button>
            {showMenu&&<div style={{position:'absolute',top:'100%',right:0,marginTop:4,background:'#fff',borderRadius:12,boxShadow:'var(--shadow-lg)',padding:4,zIndex:99,width:180,border:'1px solid var(--border)'}}>
              {USERS.map(u=>(
                <button key={u.id} onClick={()=>{setCurUser(u.id);setShowMenu(false)}} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 10px',borderRadius:8,border:'none',background:curUser===u.id?'var(--primary-l)':'transparent',width:'100%',fontSize:12,color:'var(--text)',cursor:'pointer',transition:'background .1s'}}>
                  <span style={{fontSize:16}}>{u.em}</span><div style={{textAlign:'left'}}><p style={{fontWeight:600,fontSize:12}}>{u.name}</p><p style={{fontSize:10,color:'var(--text3)'}}>{u.role}</p></div>
                </button>
              ))}
            </div>}
          </div>
        </div>

        {/* Stats */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:12}}>
          {[
            {v:`${dDone}/${dTasks.length}`,l:'오늘 업무',ic:'🎯',accent:'var(--primary)'},
            {v:`${wPct}%`,l:'주간 진행률',ic:'📊',accent:'var(--blue)'},
            {v:`${carry.length}건`,l:'이월',ic:carry.length?'🔥':'✨',accent:carry.length?'var(--danger)':'var(--text3)'},
            {v:`${posts.length}편`,l:'카페 누적',ic:'🎭',accent:'var(--accent)'}
          ].map((s,i)=>(
            <div key={i} className="stat-card">
              <p style={{fontSize:12,marginBottom:2}}>{s.ic}</p>
              <p style={{fontSize:22,fontWeight:800,color:s.accent,lineHeight:1}}>{s.v}</p>
              <p className="stat-label">{s.l}</p>
            </div>
          ))}
        </div>

        {/* Week nav */}
        <div style={{display:'flex',gap:4,justifyContent:'center'}}>
          <button onClick={()=>{setWeekOff(w=>w-1);setSelIdx(0)}} style={{width:32,height:30,borderRadius:8,border:'1px solid var(--border)',background:'#fff',color:'var(--text2)',fontSize:14,cursor:'pointer',transition:'all .15s'}}>←</button>
          <button onClick={()=>{setWeekOff(0);const d=now.getDay();setSelIdx(d>=1&&d<=5?d-1:0)}} style={{padding:'0 16px',height:30,borderRadius:8,border:'1px solid var(--border)',background:weekOff===0?'var(--primary-l)':'#fff',color:weekOff===0?'var(--primary)':'var(--text2)',fontSize:11,fontWeight:700,cursor:'pointer',transition:'all .15s'}}>이번주</button>
          <button onClick={()=>{setWeekOff(w=>w+1);setSelIdx(0)}} style={{width:32,height:30,borderRadius:8,border:'1px solid var(--border)',background:'#fff',color:'var(--text2)',fontSize:14,cursor:'pointer',transition:'all .15s'}}>→</button>
        </div>
      </div>

      {/* ── DAY SELECTOR ── */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:6,marginBottom:12}}>
        {wd.map((d,i)=>{
          const dt=allDays[i].tasks;const dn=dt.filter(t=>t.done).length;const p=dt.length?Math.round(dn/dt.length*100):0;
          const s=selIdx===i;const isToday=getDK(d)===todayDK;
          return(
            <button key={i} onClick={()=>{setSelIdx(i);setTab('today')}} style={{padding:'10px 4px 8px',borderRadius:12,border:s?'1.5px solid var(--primary)':isToday?'1.5px solid var(--warn)':'1.5px solid var(--border)',background:s?'var(--primary-xl)':'#fff',cursor:'pointer',transition:'all .15s',position:'relative'}}>
              <p style={{fontSize:10,fontWeight:600,color:s?'var(--primary)':isToday?'var(--warn)':'var(--text3)'}}>{DN[d.getDay()]}</p>
              <p style={{fontSize:18,fontWeight:800,color:s?'var(--primary)':'var(--text)',margin:'1px 0'}}>{d.getDate()}</p>
              <div style={{height:3,borderRadius:3,background:'var(--bg2)',margin:'3px 6px 0',overflow:'hidden'}}>
                <div style={{width:`${p}%`,height:'100%',borderRadius:3,background:p===100?'var(--success)':'var(--primary)',transition:'width .3s ease'}}/>
              </div>
              {p===100&&dt.length>0&&<p style={{fontSize:8,marginTop:2,color:'var(--success)',fontWeight:700}}>DONE</p>}
            </button>
          );
        })}
      </div>

      {/* ── TABS (Desktop) ── */}
      <div className="top-tabs" style={{display:'flex',gap:2,marginBottom:12,overflowX:'auto',WebkitOverflowScrolling:'touch',background:'var(--bg2)',borderRadius:12,padding:3}}>
        {tabs.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} className="tab-btn" style={{background:tab===t.id?'#fff':'transparent',color:tab===t.id?'var(--text)':'var(--text3)',boxShadow:tab===t.id?'var(--shadow-sm)':'none',flex:1}}>
            {t.ic} {t.l}
          </button>
        ))}
      </div>

      {/* ── Bottom Nav (Mobile) ── */}
      <div className="bottom-nav">
        <div className="bottom-nav-inner">
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} className={`bnav-btn ${tab===t.id?'active':''}`}>
              <span>{t.ic}</span>
              <span style={{color:tab===t.id?'var(--primary)':'var(--text3)'}}>{t.l}</span>
            </button>
          ))}
        </div>
      </div>

      {/* ── CONTENT ── */}
      {tab==='today'&&<TodayView dk={dk} tasks={dTasks} carry={carry} updateTask={updateTask} deleteTask={deleteTask} addTask={addTask} copy={copy} copyId={copyId} curUser={curUser} dPct={dPct} isToday={getDK(sel.date)===todayDK}/>}
      {tab==='week'&&<WeekView allDays={allDays} setSelIdx={setSelIdx} setTab={setTab} todayDK={todayDK}/>}
      {tab==='cafe'&&<CafeView copy={copy} copyId={copyId} posts={posts} setPosts={setPosts} personas={personas}/>}
      {tab==='memo'&&<MemoView memos={memos} setMemos={setMemos} curUser={curUser}/>}
      {tab==='record'&&<RecordView records={records} setRecords={setRecords} exportReport={exportReport} tasks={tasks} posts={posts}/>}
      {tab==='risk'&&<RiskView/>}
      {tab==='settings'&&<SettingsView keywords={keywords} setKeywords={setKeywords} personas={personas} setPersonas={setPersonas} doExport={doExport} doImport={doImport} fileRef={fileRef} ghToken={ghToken} setGhToken={setGhToken} syncMsg={syncMsg} setSyncMsg={setSyncMsg} cloudPush={cloudPush}/>}
    </div>
  );
}

/* ═══ TODAY VIEW ═══ */
function TodayView({dk,tasks,carry,updateTask,deleteTask,addTask,copy,copyId,curUser,dPct,isToday}){
  const[addMode,setAddMode]=useState(false);
  const[newTitle,setNewTitle]=useState('');
  const[newMin,setNewMin]=useState('30');
  const[newType,setNewType]=useState('blog');
  const my=tasks.filter(t=>t.who===curUser||t.who==='all');
  const other=tasks.filter(t=>t.who!==curUser&&t.who!=='all');
  const handleAdd=()=>{if(!newTitle.trim())return;addTask(dk,{id:dk+'-c'+Date.now(),type:newType,p:'P1',title:newTitle,who:curUser,min:+newMin||30,guide:[{step:'직접 추가 업무',detail:'메모 탭 참고'}],prompt:'',done:false});setNewTitle('');setAddMode(false)};

  return(<div>
    <div className="section-header">
      <h2>☀️ 오늘의 업무</h2>
      <p>진행률 {dPct}% · 총 {tasks.length}개 · 완료 {tasks.filter(t=>t.done).length}개</p>
    </div>
    {!isToday&&<div className="card" style={{padding:10,background:'var(--warn-l)',textAlign:'center'}}><p style={{fontSize:12,fontWeight:600,color:'var(--warn)'}}>📅 조회 모드 — 오늘이 아닙니다</p></div>}
    {dPct===100&&tasks.length>0&&<div className="card" style={{padding:20,background:'linear-gradient(135deg,#ecfdf5,#d1fae5)',textAlign:'center',border:'1px solid #bbf7d0'}}><p style={{fontSize:28}}>🎉</p><p style={{fontSize:16,fontWeight:700,color:'var(--success)',marginTop:4}}>오늘 업무 완료!</p><p style={{fontSize:12,color:'#047857',marginTop:2}}>{tasks.length}개 업무 모두 처리됨</p></div>}
    {carry.length>0&&<div className="card" style={{padding:12}}>
      <p style={{fontSize:12,fontWeight:700,color:'var(--danger)',marginBottom:6}}>🔄 이월 {carry.length}건</p>
      {carry.map((t,i)=><div key={i} style={{background:'var(--danger-l)',borderRadius:8,padding:'6px 10px',marginBottom:3}}><p style={{fontSize:12,fontWeight:600,color:'var(--danger)'}}>{t.title}</p><p style={{fontSize:10,color:'var(--text3)'}}>{t.from} · {t.min}분</p></div>)}
    </div>}

    {/* ── 오늘의 콘텐츠 브리프 (블로그 태스크에서 meta 추출) ── */}
    {(()=>{
      const blogTasks=tasks.filter(t=>t.type==='blog'&&t.meta);
      if(blogTasks.length===0)return null;
      return blogTasks.map((t,i)=>{
        const m=t.meta;if(!m)return null;
        return <div key={t.id} className="card" style={{padding:0,overflow:'hidden',marginBottom:10}}>
          <div style={{background:i===0?'linear-gradient(135deg,#6c5ce7,#a29bfe)':i===1?'linear-gradient(135deg,#4338ca,#6366f1)':'linear-gradient(135deg,#7c3aed,#8b5cf6)',padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <p style={{fontSize:14,fontWeight:800,color:'#fff'}}>{t.title}</p>
              <p style={{fontSize:11,color:'rgba(255,255,255,.7)'}}>{m.subtitle}</p>
            </div>
            <span style={{background:t.done?'rgba(5,150,105,.9)':'rgba(255,255,255,.2)',color:'#fff',padding:'3px 10px',borderRadius:8,fontSize:10,fontWeight:700}}>{t.done?'완료':'미완료'}</span>
          </div>
          <div style={{padding:14}}>
            {/* 서론 가이드 */}
            {m.intro&&<div style={{background:'#fffbeb',borderRadius:8,padding:10,marginBottom:10,border:'1px solid #fde68a'}}>
              <p style={{fontSize:10,fontWeight:700,color:'#b45309',marginBottom:2}}>💡 서론 첫 문장 (공감형)</p>
              <p style={{fontSize:12,color:'#92400e',fontStyle:'italic',lineHeight:1.6}}>"{m.intro}"</p>
            </div>}
            {/* 타겟 + 앵글 */}
            <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
              <div style={{flex:1,minWidth:140,background:'#fef3c7',borderRadius:8,padding:8}}>
                <p style={{fontSize:10,fontWeight:700,color:'#b45309'}}>🎯 타겟 독자</p>
                <p style={{fontSize:11,color:'#92400e',marginTop:2}}>{m.target}</p>
              </div>
              <div style={{flex:1,minWidth:140,background:'#dbeafe',borderRadius:8,padding:8}}>
                <p style={{fontSize:10,fontWeight:700,color:'#1d4ed8'}}>💡 앵글/접근법</p>
                <p style={{fontSize:11,color:'#1e40af',marginTop:2}}>{m.angle}</p>
              </div>
            </div>
            {/* 목차 + 각 항목별 글밥 */}
            <div style={{background:'#f8f7ff',borderRadius:10,padding:12,marginBottom:10,border:'1px solid #ede9fe'}}>
              <p style={{fontSize:12,fontWeight:800,color:'#5b4cdb',marginBottom:8}}>📑 본문 목차 + 들어갈 내용</p>
              {(m.tocDetail||m.toc.map(h=>({h,d:''}))).map((item,j)=><div key={j} style={{marginBottom:j<5?8:0,paddingBottom:j<5?8:0,borderBottom:j<5?'1px dashed #e5e3ef':'none'}}>
                <p style={{fontSize:12,fontWeight:700,color:'#4338ca'}}>{typeof item==='string'?item:item.h}</p>
                {item.d&&<p style={{fontSize:11,color:'var(--text2)',marginTop:2,lineHeight:1.6,paddingLeft:8,borderLeft:'2px solid #c4b5fd'}}>{item.d}</p>}
              </div>)}
            </div>
            {/* 주의사항 */}
            <div style={{background:'#fef2f2',borderRadius:8,padding:10,marginBottom:10,border:'1px solid #fecaca'}}>
              <p style={{fontSize:10,fontWeight:700,color:'#dc2626',marginBottom:4}}>⚠️ 이 주제 주의사항</p>
              {(m.cautions||[]).map((c,j)=><p key={j} style={{fontSize:11,color:'#991b1b',lineHeight:1.5}}>• {c}</p>)}
            </div>
            {/* CTA */}
            <div style={{background:'#ecfdf5',borderRadius:8,padding:8,marginBottom:10,border:'1px solid #bbf7d0'}}>
              <p style={{fontSize:10,fontWeight:700,color:'#059669'}}>📢 CTA 전략</p>
              <p style={{fontSize:11,color:'#047857'}}>{m.cta}</p>
            </div>
            {/* SEO + 태그 */}
            <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:6}}>
              {(m.tags||[]).map((tag,j)=><span key={j} style={{background:'#f0edff',color:'#7c3aed',padding:'2px 6px',borderRadius:4,fontSize:10,fontWeight:600}}>{tag}</span>)}
            </div>
            <p style={{fontSize:10,color:'var(--text3)'}}>🔑 롱테일 SEO: {(m.ltKws||[]).join(' | ')}</p>
          </div>
        </div>;
      });
    })()}

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',margin:'10px 0 8px',padding:'0 2px'}}>
      <p style={{fontSize:14,fontWeight:700}}>{curUser==='hyerim'?'혜림':curUser==='taehyun'?'태현':curUser}의 업무 <span style={{color:'var(--text3)',fontSize:12,fontWeight:500}}>({my.filter(t=>t.done).length}/{my.length})</span></p>
      <button onClick={()=>setAddMode(!addMode)} style={{padding:'5px 12px',borderRadius:8,border:'1px solid var(--border)',background:'#fff',color:'var(--text2)',fontSize:12,fontWeight:500,cursor:'pointer'}}>＋ 추가</button>
    </div>

    {addMode&&<div className="card" style={{padding:14,marginBottom:8}}>
      <input value={newTitle} onChange={e=>setNewTitle(e.target.value)} placeholder="업무 제목" className="input" style={{marginBottom:6}} onKeyDown={e=>e.key==='Enter'&&handleAdd()}/>
      <div style={{display:'flex',gap:3,marginBottom:6,flexWrap:'wrap'}}>
        {[{v:'blog',l:'블로그'},{v:'cafe',l:'카페'},{v:'seo',l:'SEO'},{v:'dev',l:'개발'},{v:'meet',l:'미팅'},{v:'check',l:'검수'}].map(t=><button key={t.v} onClick={()=>setNewType(t.v)} style={{padding:'4px 10px',borderRadius:7,border:'none',fontSize:11,fontWeight:600,background:newType===t.v?'var(--primary)':'#f1f5f9',color:newType===t.v?'#fff':'var(--text2)',cursor:'pointer'}}>{t.l}</button>)}
      </div>
      <div style={{display:'flex',gap:6}}><input value={newMin} onChange={e=>setNewMin(e.target.value)} placeholder="분" className="input" style={{width:70}}/><button onClick={handleAdd} className="btn btn-primary" style={{flex:1}}>추가</button><button onClick={()=>setAddMode(false)} className="btn btn-ghost">취소</button></div>
    </div>}

    {my.map(t=><TaskCard key={t.id} task={t} dk={dk} updateTask={updateTask} deleteTask={deleteTask} copy={copy} copyId={copyId}/>)}
    {other.length>0&&<><p style={{fontSize:14,fontWeight:800,margin:'18px 0 8px',padding:'0 4px'}}>👥 다른 팀원</p>{other.map(t=><TaskCard key={t.id} task={t} dk={dk} updateTask={updateTask} deleteTask={deleteTask} copy={copy} copyId={copyId}/>)}</>}

    <div className="card" style={{padding:14,marginTop:6,background:'linear-gradient(135deg,#f8f7ff 0%,#f0edff 100%)',border:'1px solid var(--primary-l)'}}>
      <p style={{fontSize:13,fontWeight:700,color:'var(--primary)',marginBottom:10}}>⏰ 일일 타임라인</p>
      <div style={{display:'flex',flexDirection:'column',gap:2,position:'relative',paddingLeft:18}}>
        <div style={{position:'absolute',left:7,top:6,bottom:6,width:2,background:'linear-gradient(180deg,var(--primary),var(--accent),var(--text4))',borderRadius:2}}/>
        {[
          {t:'09:00',l:'전일 성과 체크',c:'#00b894',w:15},
          {t:'09:20',l:'블로그 #1 작성',c:'#6c5ce7',w:40},
          {t:'10:00',l:'블로그 #2 작성',c:'#6c5ce7',w:40},
          {t:'10:40',l:'카페 침투글 작성',c:'#a29bfe',w:25},
          {t:'11:10',l:'SEO 점검 + 발행',c:'#e17055',w:15},
          {t:'14:00',l:'블로그 #3 (여유시)',c:'#74b9ff',w:40},
          {t:'14:40',l:'내일 준비 + 정리',c:'#636e72',w:20},
        ].map((x,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',position:'relative'}}>
          <div style={{position:'absolute',left:-14,width:10,height:10,borderRadius:'50%',background:x.c,border:'2px solid #fff',boxShadow:`0 0 6px ${x.c}44`,zIndex:1}}/>
          <span style={{fontSize:11,fontWeight:800,color:x.c,width:38,textAlign:'right',fontVariantNumeric:'tabular-nums'}}>{x.t}</span>
          <div style={{flex:1,background:'#fff',borderRadius:8,padding:'5px 10px',display:'flex',justifyContent:'space-between',alignItems:'center',border:`1px solid ${x.c}22`}}>
            <span style={{fontSize:12,color:'var(--text)',fontWeight:500}}>{x.l}</span>
            <span style={{fontSize:10,color:x.c,fontWeight:700}}>{x.w}분</span>
          </div>
        </div>)}
      </div>
    </div>
  </div>);
}

/* ═══ TASK CARD ═══ */
function TaskCard({task,dk,updateTask,deleteTask,copy,copyId}){
  const[exp,setExp]=useState(false);
  const[editing,setEditing]=useState(false);
  const[et,setEt]=useState(task.title);
  const d=task.done;
  const tm={blog:{l:'블로그',c:'#6c5ce7',bg:'#f4f2ff'},cafe:{l:'카페',c:'#a29bfe',bg:'#f0eeff'},seo:{l:'SEO',c:'#e17055',bg:'#ffeaa7'},meet:{l:'미팅',c:'#00b894',bg:'#e6fcf5'},dev:{l:'개발',c:'#fd79a8',bg:'#fff0f6'},check:{l:'검수',c:'#636e72',bg:'#f5f6fa'}};
  const ti=tm[task.type]||tm.check;const u=USERS.find(u=>u.id===task.who)||{name:'전원',em:'👥'};
  return(
    <div className="card" style={{opacity:d?.5:1,animation:'cardIn .2s ease'}}>
      <div style={{padding:'12px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
        <button onClick={()=>updateTask(dk,task.id,{done:!d})} style={{width:22,height:22,borderRadius:7,border:`2px solid ${d?'var(--success)':'var(--text4)'}`,background:d?'var(--success)':'#fff',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:700,flexShrink:0,cursor:'pointer',transition:'all .15s',marginTop:2}}>{d?'✓':''}</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:3}}>
            <span style={{width:6,height:6,borderRadius:3,background:task.p==='P0'?'var(--danger)':'var(--warn)',flexShrink:0}}/>
            <span className="tag" style={{background:ti.bg,color:ti.c,fontSize:10}}>{ti.l}</span>
            <span style={{fontSize:10,color:'var(--text3)'}}>{u.em} {u.name} · {task.min}분</span>
          </div>
          {editing?<div style={{display:'flex',gap:4}}><input value={et} onChange={e=>setEt(e.target.value)} className="input" style={{padding:'6px 10px',fontSize:13}} onKeyDown={e=>e.key==='Enter'&&(updateTask(dk,task.id,{title:et}),setEditing(false))}/><button onClick={()=>{updateTask(dk,task.id,{title:et});setEditing(false)}} className="btn btn-primary" style={{padding:'6px 12px',fontSize:11}}>저장</button></div>
          :<p onClick={()=>setExp(!exp)} style={{fontSize:14,fontWeight:600,textDecoration:d?'line-through':'none',color:d?'var(--text3)':'var(--text)',cursor:'pointer',lineHeight:1.4}}>{task.title}</p>}
          <div style={{display:'flex',gap:3,marginTop:5,flexWrap:'wrap'}}>
            <button onClick={()=>setExp(!exp)} style={{padding:'3px 8px',borderRadius:6,border:'none',background:'var(--bg2)',color:'var(--text2)',fontSize:11,fontWeight:500,cursor:'pointer',transition:'background .1s'}}>{exp?'접기 ▲':'가이드 ▼'}</button>
            {task.prompt&&<button onClick={()=>copy(task.prompt,task.id)} style={{padding:'3px 8px',borderRadius:6,border:'none',background:'var(--primary-l)',color:'var(--primary)',fontSize:11,fontWeight:600,cursor:'pointer'}}>{copyId===task.id?'✅':'📋 프롬프트'}</button>}

            <p style={{fontSize:11,fontWeight:700,color:'var(--primary)',marginBottom:6}}>📋 콘텐츠 브리프</p>

              <p><span style={{fontWeight:600,color:'var(--primary)'}}>타겟:</span> {task.meta.target}</p>
              <p><span style={{fontWeight:600,color:'var(--primary)'}}>앵글:</span> {task.meta.angle}</p>
              <p style={{marginTop:4}}><span style={{fontWeight:600,color:'var(--primary)'}}>🔑 SEO:</span> {task.meta.ltKws?.join(' | ')}</p>
              <p><span style={{fontWeight:600,color:'var(--primary)'}}>🏷 태그:</span> {task.meta.tags?.join(' ')}</p>
            </div>
          </div>}
          <p style={{fontSize:12,fontWeight:700,color:'var(--primary)',margin:'8px 0 8px'}}>실행 가이드</p>
          {(task.guide||[]).map((g,i)=><div key={i} style={{display:'flex',gap:8,marginBottom:8}}><div className="step-num" style={{background:ti.c}}>{i+1}</div><div><p style={{fontSize:13,fontWeight:600}}>{g.step}</p><p style={{fontSize:12,color:'var(--text2)',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{g.detail}</p></div></div>)}
          {task.prompt&&<div className="prompt-box"><p style={{fontSize:10,fontWeight:600,color:'var(--primary)',marginBottom:4}}>프롬프트</p><pre>{task.prompt}</pre><button className="copy-btn" onClick={()=>copy(task.prompt,task.id+'p')}>{copyId===task.id+'p'?'✅':'📋'}</button></div>}
        </div>
      </div>
    </div>
  );
}

/* ═══ WEEK VIEW ═══ */
function WeekView({allDays,setSelIdx,setTab,todayDK}){
  const wDone=allDays.flatMap(d=>d.tasks).filter(t=>t.done).length;
  const wTotal=allDays.flatMap(d=>d.tasks).length;
  return(<div>
    <div className="section-header" style={{background:'linear-gradient(135deg,#3b82f6,#6366f1)'}}>
      <h2>📅 주간 현황</h2>
      <p>완료 {wDone}/{wTotal} · 진행률 {wTotal?Math.round(wDone/wTotal*100):0}%</p>
    </div>
  {allDays.map((day,i)=>{
    const dn=day.tasks.filter(t=>t.done).length;const p=day.tasks.length?Math.round(dn/day.tasks.length*100):0;const isT=day.dk===todayDK;
    return(<div key={i} className="card" onClick={()=>{setSelIdx(i);setTab('today')}} style={{padding:'12px 14px',cursor:'pointer',display:'flex',justifyContent:'space-between',alignItems:'center',borderLeft:isT?'3px solid var(--warn)':'none',animation:'cardIn .2s ease',animationDelay:`${i*0.03}s`,animationFillMode:'both'}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:36,height:36,borderRadius:10,background:p===100?'var(--success-l)':isT?'var(--warn-l)':'var(--bg2)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
          <span style={{fontSize:9,fontWeight:600,color:isT?'var(--warn)':'var(--text3)'}}>{DN[day.date.getDay()]}</span>
          <span style={{fontSize:15,fontWeight:800,color:p===100?'var(--success)':'var(--text)'}}>{day.date.getDate()}</span>
        </div>
        <div>
          <div style={{display:'flex',gap:5,fontSize:11}}>
            <span style={{color:'var(--primary)',fontWeight:500}}>📝{day.tasks.filter(t=>t.type==='blog').length}</span>
            <span style={{color:'var(--accent)',fontWeight:500}}>🎭{day.tasks.filter(t=>t.type==='cafe').length}</span>
            {day.tasks.some(t=>t.type==='dev')&&<span style={{color:'var(--pink)',fontWeight:500}}>🛠️</span>}
            {day.tasks.some(t=>t.type==='meet')&&<span style={{color:'var(--success)',fontWeight:500}}>📋</span>}
          </div>
          <p style={{fontSize:11,color:'var(--text3)',fontWeight:400}}>완료 {dn}/{day.tasks.length}</p>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:50,height:4,borderRadius:3,background:'var(--bg2)',overflow:'hidden'}}><div style={{width:`${p}%`,height:'100%',borderRadius:3,background:p===100?'var(--success)':'var(--primary)',transition:'width .3s'}}/></div>
        <span style={{fontSize:12,fontWeight:700,color:p===100?'var(--success)':'var(--text2)',width:32,textAlign:'right'}}>{p}%</span>
      </div>
    </div>);
  })}</div>);
}

  </div>);

/* ═══ MEMO ═══ */
function MemoView({memos,setMemos,curUser}){
  const[txt,setTxt]=useState('');const[sq,setSq]=useState('');
  const u=USERS.find(x=>x.id===curUser);
  const add=()=>{if(!txt.trim())return;setMemos(p=>[{id:Date.now(),text:txt,user:curUser,name:u.name,em:u.em,time:new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'}),pin:false},...p]);setTxt('')};
  const f=memos.filter(m=>!sq||m.text.includes(sq)||m.name.includes(sq));

  return(<div>
    <div className="section-header" style={{background:'linear-gradient(135deg,#f59e0b,#f97316)'}}>
      <h2>📝 메모</h2>
      <p>{memos.length}개 메모 · 핀 {memos.filter(m=>m.pin).length}개</p>
    </div>
    <div className="card" style={{padding:14}}>
      <textarea value={txt} onChange={e=>setTxt(e.target.value)} placeholder="메모 입력... (Ctrl+Enter 저장)" className="input" style={{minHeight:70,resize:'vertical',marginBottom:6}} onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))add()}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:11,color:'var(--text3)'}}>{u.em} {u.name}</span>
        <button onClick={add} className="btn btn-primary" style={{padding:'8px 20px'}}>저장</button>
      </div>
    </div>
    {memos.length>3&&<input value={sq} onChange={e=>setSq(e.target.value)} placeholder="🔍 검색..." className="input" style={{marginBottom:8,fontSize:12}}/>}
    {f.filter(m=>m.pin).map(m=><MC key={m.id} m={m} setMemos={setMemos}/>)}
    {f.filter(m=>!m.pin).map(m=><MC key={m.id} m={m} setMemos={setMemos}/>)}
    {f.length===0&&<div style={{textAlign:'center',padding:'40px',color:'var(--text3)'}}><p style={{fontSize:24}}>📝</p><p style={{fontSize:13,marginTop:4}}>{memos.length?'검색 결과 없음':'메모 없음'}</p></div>}
  </div>);
}
function MC({m,setMemos}){
  return <div className="card" style={{padding:12,background:m.pin?'#fffbeb':'#fff',borderColor:m.pin?'#fde68a':'var(--border2)'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
      <div style={{flex:1}}>
        <div style={{display:'flex',gap:4,alignItems:'center',marginBottom:3}}>

/* ═══ RECORD VIEW ═══ */
function RecordView({records,setRecords,exportReport,tasks,posts}){
  const[type,setType]=useState('성과');const[title,setTitle]=useState('');const[detail,setDetail]=useState('');const[amount,setAmount]=useState('');
  const[sq,setSq]=useState('');const[ft,setFt]=useState('all');
  const types=[{n:'성과',ic:'📈',c:'#22c55e'},{n:'비용',ic:'💰',c:'#ef4444'},{n:'팁',ic:'💡',c:'#f59e0b'},{n:'아이디어',ic:'🧠',c:'#8b5cf6'},{n:'이슈',ic:'⚠️',c:'#0ea5e9'}];
  const add=()=>{if(!title.trim())return;setRecords(p=>[{id:Date.now(),type,title,detail,amount:amount||null,date:new Date().toLocaleDateString('ko-KR')},...p]);setTitle('');setDetail('');setAmount('')};
  const filtered=records.filter(r=>(ft==='all'||r.type===ft)&&(!sq||r.title.includes(sq)||(r.detail||'').includes(sq)));
  const tc=types.map(t=>({...t,cnt:records.filter(r=>r.type===t.n).length}));const mx=Math.max(...tc.map(t=>t.cnt),1);

  return(<div>
    <div className="section-header" style={{background:'linear-gradient(135deg,#059669,#10b981)'}}>
      <h2>📊 성과 기록</h2>
      <p>{records.length}건 기록 · {types.map(t=>t.ic+records.filter(r=>r.type===t.n).length).join(' ')}</p>
    </div>
    {records.length>0&&<div className="card" style={{padding:16}}>
      <p style={{fontSize:13,fontWeight:700,marginBottom:10}}>📋 기록 유형별 현황</p>
      <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap',justifyContent:'center'}}>
        <svg width="110" height="110" viewBox="0 0 110 110" style={{flexShrink:0}}>
          {(()=>{const total=tc.reduce((s,t)=>s+t.cnt,0)||1;let cum=0;
            return tc.filter(t=>t.cnt>0).map((t,i)=>{
              const pct=t.cnt/total;const r=45;const cx=55;const cy=55;
              const startAngle=cum*2*Math.PI-Math.PI/2;cum+=pct;
              const endAngle=cum*2*Math.PI-Math.PI/2;const large=pct>0.5?1:0;
              const x1=cx+r*Math.cos(startAngle);const y1=cy+r*Math.sin(startAngle);
              const x2=cx+r*Math.cos(endAngle);const y2=cy+r*Math.sin(endAngle);
              return <path key={i} d={`M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z`} fill={t.c} opacity=".85" stroke="#fff" strokeWidth="2"/>;
            })})()}
          <circle cx="55" cy="55" r="25" fill="white"/>
          <text x="55" y="52" textAnchor="middle" fontSize="18" fontWeight="900" fill="var(--primary)">{records.length}</text>
          <text x="55" y="65" textAnchor="middle" fontSize="8" fill="var(--text3)" fontWeight="600">총 기록</text>
        </svg>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,flex:1,minWidth:160}}>
          {tc.map((t,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'6px 8px',background:t.c+'0a',borderRadius:8}}>
            <div style={{width:8,height:8,borderRadius:3,background:t.c,flexShrink:0}}/>
            <span style={{fontSize:11,fontWeight:700,color:t.c}}>{t.cnt}</span>
            <span style={{fontSize:10,color:'var(--text3)'}}>{t.ic}{t.n}</span>
          </div>)}
        </div>
      </div>
    </div>}

    {/* ── Weekly Trend + Stats Overview ── */}
    {(()=>{
      const now2=getToday();const weeks=[];
      for(let w=3;w>=0;w--){
        const start=new Date(now2);start.setDate(start.getDate()-w*7-now2.getDay()+1);
        let blogDone=0,blogTotal=0,cafeDone=0,cafeTotal=0,allDone=0,allTotal=0;
        for(let d=0;d<5;d++){
          const dd=new Date(start);dd.setDate(dd.getDate()+d);const dk2=getDK(dd);
          const dt=tasks[dk2]||[];
          blogTotal+=dt.filter(t=>t.type==='blog').length;
          blogDone+=dt.filter(t=>t.type==='blog'&&t.done).length;
          cafeTotal+=dt.filter(t=>t.type==='cafe').length;
          cafeDone+=dt.filter(t=>t.type==='cafe'&&t.done).length;
          allTotal+=dt.length;allDone+=dt.filter(t=>t.done).length;

        <div style={{padding:'8px 14px 14px'}}>

                    {/* Blog done (dark overlay) */}
                    <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(180deg,#6c5ce7,#a29bfe)',borderRadius:'4px 4px 0 0',height:`${w.blogTotal?Math.max((w.blogDone/w.blogTotal)*100,0):0}%`,transition:'height .5s'}}/>
                  </div>
                  <div style={{width:'40%',background:w.cafeDone>0?'linear-gradient(180deg,#ec4899,#f472b6)':'#fce7f3',borderRadius:'4px 4px 0 0',height:`${Math.max(((w.cafeDone||0)/maxBlog)*65,6)}px`,transition:'height .5s'}}/>

            <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:8,height:8,borderRadius:2,background:'#e9e5ff'}}/>블로그 배정</span>
            <span style={{display:'flex',alignItems:'center',gap:3}}><span style={{width:8,height:8,borderRadius:2,background:'#ec4899'}}/>카페</span>
          </div>
        </div>
        <div style={{padding:'0 14px 14px'}}>
          <button onClick={exportReport} className="btn btn-primary" style={{width:'100%',padding:'12px'}}>📄 월간 성과 리포트 다운로드</button>
        </div>
      </div>;
    })()}

    <div className="card" style={{padding:14}}>
      <p style={{fontSize:14,fontWeight:700,marginBottom:8}}>＋ 기록 추가</p>
      <div style={{display:'flex',gap:3,marginBottom:8,flexWrap:'wrap'}}>
        {types.map(t=><button key={t.n} onClick={()=>setType(t.n)} style={{padding:'6px 12px',borderRadius:8,border:'none',fontSize:11,fontWeight:600,background:type===t.n?t.c+'18':'#f1f5f9',color:type===t.n?t.c:'var(--text2)',cursor:'pointer'}}>{t.ic} {t.n}</button>)}

    {filtered.map(r=>{const rt=types.find(t=>t.n===r.type)||types[0];return <div key={r.id} className="card" style={{padding:12,borderLeft:`4px solid ${rt.c}`}}>

  </div>);
}

function SettingsView({keywords,setKeywords,personas,setPersonas,doExport,doImport,fileRef,ghToken,setGhToken,syncMsg,setSyncMsg,cloudPush}){
  const[nk,setNk]=useState('');const[ep,setEp]=useState(null);const[pf,setPf]=useState({});
  const[clipTxt,setClipTxt]=useState('');const[clipCopied,setClipCopied]=useState(false);
  const[tokenInput,setTokenInput]=useState(ghToken||'');
  const[ghStatus,setGhStatus]=useState(Cloud.active?'connected':'disconnected');

  const addKw=()=>{if(!nk.trim()||keywords.includes(nk.trim()))return;setKeywords(p=>[...p,nk.trim()]);setNk('')};
  const startEdit=(p,i)=>{setEp(i);setPf({...p})};
  const saveP=()=>{setPersonas(p=>p.map((x,i)=>i===ep?{...pf}:x));setEp(null)};
  const addP=()=>setPersonas(p=>[...p,{id:'acc'+(p.length+1),name:`계정${p.length+1}: 새계정`,age:'',job:'',emoji:'👤',color:'#6366f1',tone:'',background:'',style:''}]);
  const delP=i=>{if(personas.length<=1)return alert('최소 1개');if(confirm('삭제?'))setPersonas(p=>p.filter((_,j)=>j!==i))};

  // Clipboard sync
  const handleClipCopy=async()=>{const ok=await ClipSync.copyToClip();setClipCopied(ok);setTimeout(()=>setClipCopied(false),2500)};
  const handleClipRestore=()=>{if(!clipTxt.trim())return;const ok=ClipSync.restore(clipTxt);if(ok){alert('복원 성공! 새로고침합니다.');location.reload()}else{alert('데이터 형식 오류. 복사한 텍스트를 정확히 붙여넣으세요.')}};

  // GitHub Repo connect
  const handleGhConnect=async()=>{
    if(!tokenInput.trim()){setSyncMsg('토큰을 입력하세요');return}
    setSyncMsg('연결 확인 중...');setGhStatus('connecting');
    Cloud.init(tokenInput.trim());
    const ok=await Cloud.test();
    if(ok){
      setGhToken(tokenInput.trim());setGhStatus('connected');
      // 기존 데이터 있으면 내려받기 시도
      const d=await Cloud.pull();
      if(d){setSyncMsg('연결 성공! 기존 데이터를 내려받았습니다.');setTimeout(()=>location.reload(),1200)}
      else{
        // 데이터 없으면 현재 데이터 올리기
        await Cloud.push();
        setSyncMsg('연결 성공! 현재 데이터를 업로드했습니다.');
      }
    }else{
      setGhStatus('error');setSyncMsg('연결 실패. 토큰을 확인하세요.');
    }
    setTimeout(()=>setSyncMsg(''),4000);
  };
  const handleGhPull=async()=>{
    if(!Cloud.active)return;
    setSyncMsg('데이터 내려받는 중...');
    const d=await Cloud.pull();
    if(d){setSyncMsg('동기화 완료! 새로고침합니다.');setTimeout(()=>location.reload(),800)}
    else{setSyncMsg('데이터 없음');setTimeout(()=>setSyncMsg(''),2000)}
  };
  const handleGhPush=async()=>{
    if(!Cloud.active)return;
    setSyncMsg('업로드 중...');
    const ok=await Cloud.push();
    setSyncMsg(ok?'업로드 완료!':'업로드 실패');setTimeout(()=>setSyncMsg(''),2000);
  };
  const handleGhDisconnect=()=>{Cloud.disconnect();setGhToken('');setGhStatus('disconnected');setSyncMsg('')};

  return(<div>
    <div className="section-header" style={{background:'linear-gradient(135deg,#6366f1,#8b5cf6)'}}>
      <h2>⚙️ 설정</h2>
      <p>동기화 · 백업 · 키워드 · 계정관리</p>
    </div>
    {/* ── Quick Sync (Clipboard) ── */}
    <div className="card" style={{padding:16,borderLeft:'4px solid var(--accent)'}}>
      <p style={{fontSize:15,fontWeight:800,marginBottom:4}}>📋 빠른 동기화 (클립보드)</p>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:12,lineHeight:1.7}}>설정 없이 바로 사용 가능. 데이터를 텍스트로 복사해서 카카오톡 "나에게 보내기"나 메모앱으로 다른 기기에 전달하세요.</p>
      <div style={{display:'flex',gap:6,marginBottom:10}} className="col-m">
        <button onClick={handleClipCopy} className="btn btn-primary" style={{flex:1,padding:'12px'}}>{clipCopied?'✅ 복사 완료!':'📋 데이터 복사'}</button>
      </div>
      <div style={{background:'#f8f9fc',borderRadius:10,padding:12,marginBottom:6}}>
        <p style={{fontSize:11,fontWeight:700,color:'var(--primary)',marginBottom:6}}>📱 다른 기기에서 복원하기</p>
        <textarea value={clipTxt} onChange={e=>setClipTxt(e.target.value)} placeholder="다른 기기에서 복사한 데이터를 여기에 붙여넣기..." className="input" style={{minHeight:60,resize:'vertical',fontSize:12,marginBottom:6}}/>
        <button onClick={handleClipRestore} className="btn btn-accent" style={{width:'100%'}} disabled={!clipTxt.trim()}>📲 붙여넣기로 복원</button>
      </div>
      <div style={{background:'#fffbeb',borderRadius:8,padding:10,border:'1px solid #fde68a'}}>
        <p style={{fontSize:11,fontWeight:700,color:'#92400e',marginBottom:4}}>💡 사용법</p>
        <p style={{fontSize:11,color:'#854d0e',lineHeight:1.8}}>
          ① "데이터 복사" 클릭 → 데이터가 클립보드에 복사됨<br/>
          ② 카카오톡 "나에게 보내기"에 붙여넣기 → 전송<br/>
          ③ 다른 기기(폰/PC)에서 이 대시보드 열기<br/>
          ④ 카톡에서 텍스트 복사 → 위 입력창에 붙여넣기<br/>
          ⑤ "붙여넣기로 복원" 클릭 → 완료!
        </p>
      </div>
    </div>

    {/* ── Cloud Sync (GitHub Repo) ── */}
    <div className="card" style={{padding:16,borderLeft:'4px solid var(--warn)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}}>
        <p style={{fontSize:15,fontWeight:800}}>☁️ 클라우드 동기화</p>
        <span style={{fontSize:11,padding:'3px 10px',borderRadius:8,fontWeight:700,
          background:ghStatus==='connected'?'var(--success-l)':ghStatus==='error'?'var(--danger-l)':'#f8fafc',
          color:ghStatus==='connected'?'var(--success)':ghStatus==='error'?'var(--danger)':'var(--text3)'}}>
          {ghStatus==='connected'?'🟢 연결됨':ghStatus==='error'?'🔴 오류':'⚪ 미연결'}
        </span>
      </div>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:12,lineHeight:1.7}}>
        GitHub 저장소에 데이터를 자동 저장합니다. 토큰만 입력하면 어디서든 동기화!
      </p>

      {ghStatus==='connected'?<div>
        <div style={{background:'var(--success-l)',borderRadius:10,padding:12,marginBottom:8}}>
          <p style={{fontSize:12,fontWeight:700,color:'var(--success)',marginBottom:4}}>✅ 클라우드 연결됨</p>
          <p style={{fontSize:11,color:'#047857'}}>저장소: <code style={{background:'#d1fae5',padding:'2px 6px',borderRadius:4,fontWeight:700,fontSize:10}}>marketing-dash/data.json</code></p>
          <p style={{fontSize:10,color:'var(--text3)',marginTop:4}}>다른 기기에서 같은 토큰을 입력하면 자동 동기화됩니다</p>
        </div>
        {syncMsg&&<p style={{fontSize:12,fontWeight:600,color:'var(--primary)',marginBottom:8,textAlign:'center'}}>{syncMsg}</p>}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:6}}>
          <button onClick={handleGhPush} className="btn btn-primary" style={{justifyContent:'center'}}>⬆️ 업로드</button>
          <button onClick={handleGhPull} className="btn btn-success" style={{justifyContent:'center'}}>⬇️ 내려받기</button>
        </div>
        <button onClick={handleGhDisconnect} className="btn btn-danger" style={{width:'100%'}}>연결 해제</button>
      </div>
      :<div>
        <div style={{background:'var(--accent-l)',borderRadius:10,padding:12,marginBottom:10}}>
          <p style={{fontSize:12,fontWeight:700,color:'var(--primary)',marginBottom:4}}>💡 토큰만 입력하면 끝!</p>
          <p style={{fontSize:11,color:'var(--text2)',lineHeight:1.7}}>토큰 입력 → "연결" 클릭 → 자동으로 데이터가 GitHub 저장소에 저장됩니다. 다른 기기에서도 같은 토큰만 입력하면 OK!</p>
        </div>
        <div style={{marginBottom:10}}>
          <label style={{fontSize:11,fontWeight:700,color:'var(--text2)',display:'block',marginBottom:4}}>GitHub Token</label>
          <input value={tokenInput} onChange={e=>setTokenInput(e.target.value)} placeholder='ghp_xxxxx...' className="input" type="password" style={{fontSize:13,fontFamily:'monospace'}}/>
        </div>
        {syncMsg&&<p style={{fontSize:12,fontWeight:600,color:ghStatus==='error'?'var(--danger)':'var(--primary)',marginBottom:8,textAlign:'center'}}>{syncMsg}</p>}
        <button onClick={handleGhConnect} className="btn btn-primary" style={{width:'100%',padding:'14px'}} disabled={!tokenInput.trim()||ghStatus==='connecting'}>
          {ghStatus==='connecting'?'연결 확인 중...':'🔗 연결'}
        </button>
      </div>}
    </div>

    {/* ── Backup ── */}
    <div className="card" style={{padding:16}}>
      <p style={{fontSize:15,fontWeight:800,marginBottom:10}}>💾 백업 관리</p>
      <p style={{fontSize:12,color:'var(--text2)',marginBottom:10,lineHeight:1.6}}>모든 데이터가 브라우저에 자동 저장됩니다. 60초마다 자동 백업 스냅샷이 생성됩니다.</p>
      <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
        <button onClick={doExport} className="btn btn-primary" style={{flex:1}}>📥 JSON 백업</button>
        <button onClick={()=>fileRef.current?.click()} className="btn btn-success" style={{flex:1}}>📤 JSON 복원</button>
        <input ref={fileRef} type="file" accept=".json" onChange={doImport} style={{display:'none'}}/>
      </div>
      <button onClick={()=>confirm('모든 데이터가 삭제됩니다! 백업을 먼저 해주세요.')&&(S.clear(),location.reload())} className="btn btn-danger" style={{width:'100%',marginTop:8}}>⚠️ 전체 초기화</button>
    </div>

    {/* ── Keywords ── */}
    <div className="card" style={{padding:16}}>
      <p style={{fontSize:15,fontWeight:800,marginBottom:10}}>🔑 키워드 풀 ({keywords.length}개)</p>
      <div style={{display:'flex',gap:4,marginBottom:10}}>
        <input value={nk} onChange={e=>setNk(e.target.value)} placeholder="새 키워드" className="input" style={{flex:1}} onKeyDown={e=>e.key==='Enter'&&addKw()}/>
        <button onClick={addKw} className="btn btn-primary">추가</button>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
        {keywords.map((kw,i)=><span key={i} style={{display:'inline-flex',alignItems:'center',gap:4,padding:'5px 10px',background:'#f1f5f9',borderRadius:8,fontSize:11}}>
          {kw}<button onClick={()=>setKeywords(p=>p.filter(x=>x!==kw))} style={{width:18,height:18,borderRadius:4,border:'none',background:'#fecaca',color:'#dc2626',fontSize:9,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
        </span>)}
      </div>
    </div>

    {/* ── Personas ── */}
    <div className="card" style={{padding:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <p style={{fontSize:15,fontWeight:800}}>🎭 계정 ({personas.length}개)</p>
        <button onClick={addP} className="btn btn-primary" style={{fontSize:11,padding:'6px 14px'}}>＋ 추가</button>
      </div>
      {personas.map((pp,i)=><div key={i} style={{background:'#f8fafc',borderRadius:12,padding:12,marginBottom:8,border:`1.5px solid ${pp.color}22`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:22}}>{pp.emoji}</span>
            <div><p style={{fontSize:13,fontWeight:700,color:pp.color}}>{pp.name}</p><p style={{fontSize:11,color:'var(--text2)'}}>{pp.age} · {pp.job}</p></div>
          </div>
          <div style={{display:'flex',gap:3}}>
            <button onClick={()=>startEdit(pp,i)} className="btn btn-ghost" style={{padding:'4px 10px',fontSize:11}}>✏️</button>
            <button onClick={()=>delP(i)} className="btn btn-danger" style={{padding:'4px 8px',fontSize:11}}>🗑</button>
          </div>
        </div>
      </div>)}
    </div>

    {/* Persona Modal */}
    {ep!==null&&<div className="modal-overlay" onClick={()=>setEp(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <p style={{fontSize:16,fontWeight:800,marginBottom:16}}>🎭 페르소나 편집</p>
      {[{k:'name',l:'계정명',ph:'계정1: 민지'},{k:'emoji',l:'이모지',ph:'👩'},{k:'color',l:'색상',ph:'#ec4899'},{k:'age',l:'나이/성별',ph:'32세 여성'},{k:'job',l:'직업',ph:'중소기업 경리'},
        {k:'tone',l:'말투',ph:'~거든요 체...',a:1},{k:'background',l:'배경',ph:'채무 상황...',a:1},{k:'style',l:'스타일',ph:'소심한 느낌...',a:1},
        {k:'typos',l:'맞춤법/띄어쓰기 패턴',ph:'됬다/됐다 혼용, 띄어쓰기 가끔 틀림...',a:1},{k:'ageStyle',l:'나이대별 문체',ph:'30대 여성: ㅠㅠ, ㅎㅎ 사용...',a:1}
      ].map(f=><div key={f.k} style={{marginBottom:8}}>
        <label style={{fontSize:11,fontWeight:700,color:'var(--primary)',display:'block',marginBottom:3}}>{f.l}</label>
        {f.a?<textarea value={pf[f.k]||''} onChange={e=>setPf(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} className="input" style={{minHeight:55,resize:'vertical'}}/>
        :<input value={pf[f.k]||''} onChange={e=>setPf(p=>({...p,[f.k]:e.target.value}))} placeholder={f.ph} className="input"/>}
      </div>)}
      <div style={{display:'flex',gap:6,marginTop:12}}>
        <button onClick={saveP} className="btn btn-primary" style={{flex:1}}>저장</button>
        <button onClick={()=>setEp(null)} className="btn btn-ghost" style={{flex:1}}>취소</button>
      </div>
    </div></div>}

    <div className="card" style={{padding:14,background:'linear-gradient(135deg,#ecfdf5,#d1fae5)',borderColor:'#bbf7d0'}}>
      <p style={{fontSize:13,fontWeight:700,color:'#065f46'}}>✅ 자동 저장 활성</p>
      <p style={{fontSize:12,color:'#047857',lineHeight:1.6}}>모든 변경 즉시 저장 · 60초 자동 백업 · 클립보드/GitHub 클라우드로 기기 간 동기화 가능</p>
    </div>
  </div>);
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
